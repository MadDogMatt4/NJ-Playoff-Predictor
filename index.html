function renderResultsTab(){
  const el = document.getElementById('tab-results');
  if (state.teams.length < 2){
    el.innerHTML = `<div class="panel"><p class="empty">Add teams and games to see rankings.</p></div>`;
    return;
  }
  const sections = getAllSections();
  if (!sections.length){
    el.innerHTML = `<div class="panel"><p class="empty">No sections yet.</p></div>`;
    return;
  }
  if (!selectedSection || !sections.some(s=>sectionKey(s.region,s.group)===selectedSection)){
    selectedSection = sectionKey(sections[0].region, sections[0].group);
  }
  const sectionOptions = sections.map(s => {
    const key = sectionKey(s.region,s.group);
    return `<option value="${key}" ${key===selectedSection?'selected':''}>${s.label}</option>`;
  }).join('');

  if (!effectiveGames().length){
    el.innerHTML = `
      <div class="panel">
        <h2>Rankings</h2>
        <div class="form-row">
          <div class="field"><label>Section</label><select id="sectionSelect" onchange="selectedSection=this.value; renderResultsTab();">${sectionOptions}</select></div>
        </div>
        <p class="empty">Add games (or make predictions on the Predict tab) to see rankings for this section.</p>
      </div>`;
    return;
  }

  const r = computeUPR(selectedSection);

  let rows = r.ranked.map((t,i) => {
    const seed = i+1;
    const isQualify = r.qualifiedIds.has(t.id);
    const cutline = (seed === 16 && !r.autoQualifiedIn[t.id] && !r.autoEliminated[t.id]) ? 'cutline' : '';
    const jumpTag = r.jumped[t.id] ? '<span class="jump-tag">▲ H2H</span>' : '';
    const aqTag = r.autoQualifiedIn[t.id] ? '<span class="jump-tag" style="color:var(--gold);">★ Auto-Qualifier</span>' : '';
    const elimTag = r.autoEliminated[t.id] ? '<span class="tie-flag">Bumped by Auto-Qualifier</span>' : '';
    const tf = r.tieFlags[t.id];
    const tieTag = tf ? `<span class="tie-flag" title="Tied with: ${tf.otherNames.join(', ')}">COIN FLIP NEEDED</span>` : '';
    const tbLog = r.tiebreakerLog[t.id];
    const tbTag = tbLog
      ? `<span class="tb-tag" title="${tbLog.result==='won' ? 'Won' : 'Lost'} tiebreaker vs. ${tbLog.vsNames.join(', ')} — decided by ${tbLog.step}">${tbLog.result==='won'?'✓':'✗'} TB: ${tbLog.step}</span>`
      : '';
    return `
      <tr class="${isQualify?'qualify':''} ${cutline}">
        <td class="rank-num">${seed}</td>
        <td class="team-name" style="cursor:pointer" onclick="openDetail('${t.id}')">${t.name}${jumpTag}${aqTag}${elimTag}${tieTag}${tbTag}<div style="font-size:10.5px; color:var(--chalk-dim); font-weight:normal; margin-top:2px;">${recordLine(t.id)}</div></td>
        <td class="num">${r.osiTotal[t.id].toFixed(2)}</td>
        <td class="num">${r.osiRank[t.id]}</td>
        <td class="num">${r.ppTotal[t.id].toFixed(2)}</td>
        <td class="num">${r.ppRank[t.id]}</td>
        <td class="num">${r.uprScore[t.id].toFixed(3)}</td>
        <td class="center">${catPill(r.finalCat[t.id])}</td>
      </tr>
    `;
  }).join('');

  // Any coin-flips needed in this section, deduplicated by key, for the admin resolution panel.
  const pendingFlips = [];
  const seenKeys = new Set();
  Object.values(r.tieFlags).forEach(tf => {
    if (seenKeys.has(tf.key)) return;
    seenKeys.add(tf.key);
    const teams = tf.key.split(',').map(id => state.teams.find(t=>t.id===id)).filter(Boolean);
    pendingFlips.push({ key: tf.key, teams });
  });
  const coinFlipPanel = pendingFlips.length ? `
    <div class="panel" style="border-color:var(--gold-dim);">
      <h2 style="color:var(--gold);">Coin Flips Needed ${isAdmin ? '' : '<span style="color:var(--chalk-dim); font-size:11px; text-transform:none;">(admin resolves these)</span>'}</h2>
      <p class="hint">These teams are tied even after Head-to-Head, Common Opponents, OSI, and Power Points — per the regs, only a real coin flip breaks this. Pick the winner of each flip below once it's been performed.</p>
      ${pendingFlips.map(pf => `
        <div class="form-row" style="align-items:center; margin-bottom:8px;">
          <span style="font-size:12.5px; color:var(--chalk-dim); min-width:160px;">${pf.teams.map(t=>t.name).join(' vs ')}:</span>
          ${isAdmin ? pf.teams.map(t => `<button class="ghost" onclick="resolveCoinFlip('${pf.key}','${t.id}')">${t.name} wins flip</button>`).join('') : ''}
        </div>
      `).join('')}
    </div>
  ` : '';

  el.innerHTML = `
    <div class="panel">
      <h2>Final Standings</h2>
      <div class="form-row">
        <div class="field"><label>Section</label><select id="sectionSelect" onchange="selectedSection=this.value; renderResultsTab();">${sectionOptions}</select></div>
      </div>
      ${hasAnyProjectedGames() ? `<p style="background:rgba(201,162,39,0.12); border:1px solid var(--gold-dim); border-radius:4px; padding:8px 12px; font-size:12.5px; color:var(--gold); margin:0 0 14px;">
        ⚡ These rankings include your own predictions for one or more not-yet-played games. Only you see this — switch to the Predict tab to change picks, or <span style="text-decoration:underline; cursor:pointer;" onclick="clearAllPredictions()">clear all your predictions</span> to see official-only rankings.
      </p>` : ''}
      <p class="hint">Lower UPR score = better. Ranking is scoped to this section only — but OSI/Power Points totals already account for any games against teams in <em>other</em> sections. Green rows qualify for states (top 16, after any auto-qualifier swaps). Dashed line marks the natural #16 cutoff. "▲ H2H" = moved up via the seeding rule; "★ Auto-Qualifier" = undefeated team (7+ wins vs. member schools, no ties) that bumped into the field; "Bumped by Auto-Qualifier" = lost a spot because of one. Click a team name for its full breakdown.</p>
      <div class="table-scroll">
        <table class="results-table">
          <thead><tr>
            <th>Seed</th><th>Team</th>
            <th class="num">OSI</th><th class="num">OSI Rk</th>
            <th class="num">Power Pts</th><th class="num">PP Rk</th>
            <th class="num">UPR</th><th class="center">Mult. Cat (final)</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="legend">
        <span><span class="dot" style="background:rgba(60,107,66,0.5)"></span>Qualifies for states</span>
        <span>▲ H2H = moved up via head-to-head jump rule</span>
        <span style="color:var(--gold)">★ Auto-Qualifier = undefeated team bumped into the field</span>
        <span style="color:#7ec8e8">✓/✗ TB: [step] = result of a tiebreaker — hover for who and why</span>
      </div>
    </div>
    ${coinFlipPanel}
    <div class="panel">
      <h2>Known limitations</h2>
      <p class="hint" style="margin-bottom:0;">
        Not yet implemented: the North/South snake-seeding bracket display (qualification and seeding order are fully modeled — head-to-head, common opponents, OSI, Power Points, coin flip, and the auto-qualifier/eliminator rule are all live). The bracket pairing/home-team display is the remaining piece.
      </p>
    </div>
  `;
}

function renderBracketTab(){
  const el = document.getElementById('tab-bracket');
  const sections = getAllSections();
  if (!sections.length){
    el.innerHTML = `<div class="panel"><p class="empty">No sections yet.</p></div>`;
    return;
  }
  if (!selectedBracketSection || !sections.some(s=>sectionKey(s.region,s.group)===selectedBracketSection)){
    selectedBracketSection = sectionKey(sections[0].region, sections[0].group);
  }
  const sectionOptions = sections.map(s => {
    const key = sectionKey(s.region,s.group);
    return `<option value="${key}" ${key===selectedBracketSection?'selected':''}>${s.label}</option>`;
  }).join('');

  const selSection = sections.find(s => sectionKey(s.region,s.group)===selectedBracketSection);
  const region = selSection ? selSection.region : null;
  const group = selSection ? selSection.group : null;
  const isNonPublic = (group === 'NPA' || group === 'NPB');

  const r = computeUPR(selectedBracketSection);
  // top16 is the resolved, seeded field (tiebreakers + auto-qualifiers applied). For NPA the
  // bracket is only the top 8 of that; NPB and publics use the full 16.
  const field = (group === 'NPA') ? (r.top16 ? r.top16.slice(0,8) : []) : r.top16;
  const brackets = buildBrackets(field, region, group);

  const needLabel = isNonPublic ? (group==='NPA' ? '8' : '16') : '16';
  const haveCount = r.top16 ? (group==='NPA' ? Math.min(r.top16.length,8) : r.top16.length) : 0;

  const projNote = hasAnyProjectedGames() ? `<p style="background:rgba(201,162,39,0.12); border:1px solid var(--gold-dim); border-radius:4px; padding:8px 12px; font-size:12.5px; color:var(--gold); margin:0 0 4px;">⚡ This bracket reflects your own predictions for not-yet-played games.</p>` : '';

  let hintText;
  if (isNonPublic){
    hintText = `Non-public teams are <strong>seeded by committee</strong>, not by this bracket — the order shown here is the UPR ranking as a reference only, and the actual tournament seeding may differ.`;
  } else {
    hintText = `Seeding uses the final resolved top 16 (after tiebreakers, head-to-head, and auto-qualifiers), split into two 8-team brackets via the NJSIAA snake.${brackets && brackets.type==='split' && !brackets.northingKnown ? ' <strong>Northing not set for the top two seeds — bracket labels may be reversed until you add northing on the Teams tab.</strong>' : ''}`;
  }

  const header = `
    <div class="panel">
      <h2>Tournament Bracket</h2>
      <div class="form-row">
        <div class="field"><label>Section</label><select id="bracketSectionSelect" onchange="selectedBracketSection=this.value; renderBracketTab();">${sectionOptions}</select></div>
      </div>
      ${projNote}
      <p class="hint">${hintText}</p>
    </div>`;

  if (!brackets){
    el.innerHTML = header + `<div class="panel"><p class="empty">This section needs a full field of ${needLabel} qualified teams before a bracket can be seeded. (${haveCount} currently qualified.)</p></div>`;
    return;
  }

  const matchupHtml = (m, useLocalSlot) => {
    const teamLine = (entry) => {
      if (!entry || !entry.team) return `<div class="bk-team"><span class="bk-seed">—</span> <span>TBD</span></div>`;
      const seedNum = useLocalSlot ? entry.localSlot : entry.overallSeed;
      return `<div class="bk-team">
        <span class="bk-seed">${seedNum}</span>
        <span class="bk-name">${entry.team.name}<div style="font-size:9.5px; color:var(--chalk-dim); margin-top:1px;">${recordLine(entry.team.id)}</div></span>
      </div>`;
    };
    return `<div class="bk-matchup">${teamLine(m.high)}${teamLine(m.low)}</div>`;
  };

  const bracketColumn = (bracket, showAnchor, useLocalSlot) => `
    <div class="bk-col">
      <div class="bk-col-title">${bracket.label}</div>
      ${showAnchor ? `<div class="bk-col-sub">Top seed: ${bracket.anchor ? bracket.anchor.name : '—'}</div>` : ''}
      ${bracket.matchups.map(m => matchupHtml(m, useLocalSlot)).join('')}
    </div>`;

  if (brackets.type === 'single'){
    el.innerHTML = header + `
      <div class="panel">
        <p style="background:rgba(201,162,39,0.12); border:1px solid var(--gold-dim); border-radius:4px; padding:8px 12px; font-size:12.5px; color:var(--gold); margin:0 0 16px;">⚖ Committee-seeded — the bracket below orders teams by UPR for reference only.</p>
        <div class="bk-wrap">
          ${bracketColumn(brackets, false, false)}
        </div>
        <p class="hint" style="margin-top:16px; margin-bottom:0;">Numbers shown are UPR seeds. First-round pairing follows standard bracket structure (1 vs ${brackets.slots.length}, and so on toward the middle).</p>
      </div>`;
    return;
  }

  el.innerHTML = header + `
    <div class="panel">
      <div class="bk-wrap">
        ${bracketColumn(brackets.bracket1, true, true)}
        ${bracketColumn(brackets.bracket2, true, true)}
      </div>
      <p class="hint" style="margin-top:16px; margin-bottom:0;">Each bracket is seeded 1–8, pairing 1v8, 4v5, 3v6, 2v7. Once a supersection splits into these two brackets, no further head-to-head movement occurs.</p>
    </div>`;
}

function renderStandingsTab(){
  const el = document.getElementById('tab-standings');
  const divisions = getAllDivisions();
  if (!divisions.length){
    el.innerHTML = `<div class="panel"><p class="empty">No conference/division assignments yet.${isAdmin ? ' Add them on the Teams tab using the Bulk Set Conference/Division tool (after running the migration).' : ''}</p></div>`;
    return;
  }

  const confs = [...new Set(divisions.map(d=>d.conference))].sort((a,b)=>a.localeCompare(b));
  if (selectedStandingsConf !== 'all' && !confs.includes(selectedStandingsConf)) selectedStandingsConf = 'all';
  const confOptions = [`<option value="all" ${selectedStandingsConf==='all'?'selected':''}>All conferences</option>`]
    .concat(confs.map(c => `<option value="${escapeHtml(c)}" ${selectedStandingsConf===c?'selected':''}>${escapeHtml(c)}</option>`))
    .join('');

  const shownDivisions = divisions.filter(d => selectedStandingsConf==='all' || d.conference===selectedStandingsConf);

  const projNote = hasAnyProjectedGames() ? `<p style="background:rgba(201,162,39,0.12); border:1px solid var(--gold-dim); border-radius:4px; padding:8px 12px; font-size:12.5px; color:var(--gold); margin:0 0 4px;">⚡ These standings reflect your own predictions for not-yet-played games.</p>` : '';

  const divisionBlock = (d) => {
    const rows = computeDivisionStandings(d.key);
    if (!rows.length) return '';
    const bodyRows = rows.map(r => {
      const rec = r.record;
      const isLeader = r.place === 1;
      const champTag = isLeader
        ? (r.coPlaced ? '<span class="tie-flag" style="border-color:var(--gold); color:var(--gold);">Co-Champion</span>' : '<span class="jump-tag" style="color:var(--gold);">★ Division Leader</span>')
        : (r.coPlaced ? '<span class="tie-flag" style="font-size:9px;">tied</span>' : '');
      return `
        <tr class="${isLeader?'qualify':''}">
          <td class="rank-num">${r.place}</td>
          <td class="team-name" style="cursor:pointer" onclick="openDetail('${r.team.id}')">${r.team.name} ${champTag}</td>
          <td class="num">${rec.w}–${rec.l}${rec.t?('–'+rec.t):''}</td>
          <td class="num">${(rec.pct*100).toFixed(1)}%</td>
        </tr>`;
    }).join('');
    return `
      <div class="panel">
        <h2 style="margin-bottom:2px;">${escapeHtml(d.division)}</h2>
        <div style="font-size:11.5px; color:var(--chalk-dim); font-family:'IBM Plex Mono',monospace; margin-bottom:12px;">${escapeHtml(d.conference)}</div>
        <div class="table-scroll">
          <table class="results-table">
            <thead><tr><th>Pos</th><th>Team</th><th class="num">Div. Record</th><th class="num">Win %</th></tr></thead>
            <tbody>${bodyRows}</tbody>
          </table>
        </div>
      </div>`;
  };

  // NJIC conference playoff bracket — shown when viewing All or the NJIC conference.
  let njicHtml = '';
  if (selectedStandingsConf === 'all' || selectedStandingsConf === NJIC_CONFERENCE_NAME){
    njicHtml = renderNjicBracket();
  }

  // SFC Ivy playoff bracket — shown when viewing All or the SFC conference.
  let ivyHtml = '';
  if (selectedStandingsConf === 'all' || selectedStandingsConf === SFC_CONFERENCE_NAME){
    ivyHtml = renderIvyBracket();
  }

  el.innerHTML = `
    <div class="panel">
      <h2>Conference & Division Standings</h2>
      <div class="form-row">
        <div class="field"><label>Conference</label><select id="standingsConfSelect" onchange="selectedStandingsConf=this.value; renderStandingsTab();">${confOptions}</select></div>
      </div>
      ${projNote}
      <p class="hint">Standings count only games between teams in the same division. Ties are broken by head-to-head record among the tied teams; a genuinely circular tie that can't be separated is shown as co-champions. This is fully separate from the UPR / state-playoff system.</p>
    </div>
    ${njicHtml}
    ${ivyHtml}
    ${shownDivisions.map(divisionBlock).join('')}
  `;
}

function renderNjicBracket(){
  const bracket = buildNjicBracket();
  if (!bracket) return '';

  // Render one team slot: single champ, a slash of unresolved co-champs, or "none yet".
  const champSlot = (divisionName) => {
    const c = bracket.champs[divisionName];
    const isHome = bracket.semis.some(s => s.home === divisionName);
    const homeTag = isHome ? ` <span class="jump-tag" style="font-size:9px; color:var(--turf-bright);">home</span>` : '';
    if (!c || c.missing || !c.teams.length){
      return `<div class="bk-team"><span style="color:var(--chalk-dim);">— no ${escapeHtml(divisionName)} champ yet —</span><span style="font-size:10px; color:var(--chalk-dim); margin-left:6px;">${escapeHtml(divisionName)}</span>${homeTag}</div>`;
    }
    const names = c.teams.map(t=>t.name).join(' / ');
    const tieNote = c.stillTied
      ? ` <span class="tie-flag" title="Head-to-head and UPR could not separate these teams. In reality the NJIC uses defensive points allowed, which can't be projected here.">tied — pts allowed decides</span>`
      : '';
    const byNote = (c.resolvedBy === 'head-to-head') ? ` <span class="jump-tag" style="font-size:9px;">via H2H</span>`
                 : (c.resolvedBy === 'UPR') ? ` <span class="jump-tag" style="font-size:9px;">via UPR</span>`
                 : '';
    return `<div class="bk-team"><span class="bk-name">${escapeHtml(names)}</span><span style="font-size:10px; color:var(--chalk-dim); margin-left:6px;">${escapeHtml(divisionName)}</span>${homeTag}${byNote}${tieNote}</div>`;
  };

  const semiBlock = (semi) => `
    <div class="bk-matchup" style="min-width:280px;">
      ${champSlot(semi.away)}
      ${champSlot(semi.home)}
    </div>`;

  return `
    <div class="panel" style="border-color:var(--gold-dim);">
      <h2 style="color:var(--gold);">NJIC Conference Playoff</h2>
      <p class="hint">Projected from current division standings. The four division champions meet in a two-round bracket: <strong>Colonial vs Meadowlands</strong> and <strong>Liberty vs Patriot</strong> in the semifinals (Week 7), winners meet in the final (Week 8). Home team is by yearly rotation — this year Meadowlands and Patriot host their semifinals. Division champs are decided by division record, then head-to-head, then UPR; if still tied, the real NJIC uses defensive points allowed (shown here as a tie until you enter actual scores).</p>
      <div style="display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start;">
        <div class="bk-col" style="min-width:290px;">
          <div class="bk-col-title">Semifinals</div>
          ${bracket.semis.map(semiBlock).join('')}
        </div>
        <div class="bk-col" style="min-width:290px;">
          <div class="bk-col-title">Final</div>
          <div class="bk-matchup" style="min-width:280px;">
            <div class="bk-team"><span style="color:var(--chalk-dim);">Colonial / Meadowlands winner</span></div>
            <div class="bk-team"><span style="color:var(--chalk-dim);">Liberty / Patriot winner</span></div>
          </div>
          <p class="hint" style="margin-top:10px; margin-bottom:0;">The final matchup fills in once semifinal results are entered.</p>
        </div>
      </div>
    </div>`;
}

function renderIvyBracket(){
  const iv = buildIvyBracket();
  if (!iv) return '';

  const seedByNum = {}; iv.seeds.forEach(s => seedByNum[s.seed] = s);
  const teamLabel = (s) => {
    if (!s || !s.teams || !s.teams.length){
      return `<span style="color:var(--chalk-dim);">— no ${s ? escapeHtml(s.division||'') : ''} ${s ? s.finish : ''} yet —</span>`;
    }
    const names = s.teams.map(t=>t.name).join(' / ');
    const tie = s.coPlaced ? ` <span class="tie-flag" style="font-size:9px;">tied</span>` : '';
    return `<span class="bk-name">${escapeHtml(names)}</span>${tie}`;
  };
  const seedRow = (seedNum) => {
    const s = seedByNum[seedNum];
    const dTag = s && s.division ? `<span style="font-size:10px; color:var(--chalk-dim); margin-left:6px;">D${s.divisionRank} ${escapeHtml(s.division)} ${s.finish==='first'?'1st':'2nd'}</span>` : '';
    return `<div class="bk-team"><span class="bk-seed">${seedNum}</span>${teamLabel(s)}${dTag}</div>`;
  };

  // Division-ranking table (D1/D2/D3 from Week 1 crossovers).
  const rankRows = iv.divRanks.map(r => `
    <tr>
      <td class="rank-num">D${r.rank}</td>
      <td class="team-name">${escapeHtml(r.division)}</td>
      <td class="num">${r.record.w}-${r.record.l}${r.record.t?('-'+r.record.t):''}</td>
      <td class="num">${r.avgSI.toFixed(2)}</td>
    </tr>`).join('');

  return `
    <div class="panel" style="border-color:var(--gold-dim);">
      <h2 style="color:var(--gold);">SFC Ivy Division Playoff</h2>
      <p class="hint">Division ranking (D1–D3) comes from each division's combined record in Week 1 crossover games (ties broken by division average Strength Index). The top two teams in each division qualify; seeds are assigned D1-1st=1, D2-1st=2, D3-1st=3, D3-2nd=4, D2-2nd=5, D1-2nd=6. A standard six-team bracket plays Weeks 7–9 (seeds 1 & 2 bye to the semifinals).</p>
      <p class="hint" style="border-left:3px solid var(--gold-dim); padding-left:10px;"><strong>Tiebreaker note:</strong> to decide the top two within a division, this app breaks ties by division record, then head-to-head, then UPR, then OSI, then Power Points. This is our own procedure for projecting seeds and may not match the actual tiebreaker process the SFC uses.</p>

      <div style="margin-bottom:16px;">
        <div class="bk-col-title">Division Ranking (Week 1 crossovers)</div>
        <div class="table-scroll">
          <table class="results-table">
            <thead><tr><th>Rank</th><th>Division</th><th class="num">Wk 1 Record</th><th class="num">Avg SI</th></tr></thead>
            <tbody>${rankRows}</tbody>
          </table>
        </div>
      </div>

      <div style="display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start;">
        <div class="bk-col" style="min-width:300px;">
          <div class="bk-col-title">First Round (Week 7)</div>
          <div class="bk-matchup">${seedRow(3)}${seedRow(6)}</div>
          <div class="bk-matchup">${seedRow(4)}${seedRow(5)}</div>
        </div>
        <div class="bk-col" style="min-width:300px;">
          <div class="bk-col-title">Semifinals (Week 8)</div>
          <div class="bk-matchup">${seedRow(1)}<div class="bk-team"><span class="bk-seed">—</span><span style="color:var(--chalk-dim);">4/5 winner</span></div></div>
          <div class="bk-matchup">${seedRow(2)}<div class="bk-team"><span class="bk-seed">—</span><span style="color:var(--chalk-dim);">3/6 winner</span></div></div>
        </div>
        <div class="bk-col" style="min-width:260px;">
          <div class="bk-col-title">Final (Week 9)</div>
          <div class="bk-matchup">
            <div class="bk-team"><span style="color:var(--chalk-dim);">Semifinal 1 winner</span></div>
            <div class="bk-team"><span style="color:var(--chalk-dim);">Semifinal 2 winner</span></div>
          </div>
        </div>
      </div>
    </div>`;
}

function renderDetailTab(){
  const el = document.getElementById('tab-detail');
  if (!state.teams.length){
    el.innerHTML = `<div class="panel"><p class="empty">Add teams first.</p></div>`;
    return;
  }
  if (!selectedDetailTeam) selectedDetailTeam = state.teams[0].id;
  const r = computeUPR();
  const options = [...state.teams]
    .sort((a,b)=> a.name.localeCompare(b.name))
    .map(t=>`<option value="${t.id}" ${t.id===selectedDetailTeam?'selected':''}>${t.name}</option>`).join('');

  const ppLog = r.ppGameLog[selectedDetailTeam] || [];
  const osiLog = r.osiGameLog[selectedDetailTeam] || [];

  const ppRows = ppLog.map(l => `
    <tr>
      <td class="num">${l.week}</td>
      <td class="team-name">${teamName(l.oppId)}</td>
      <td class="center">${l.result}</td>
      <td class="num">${l.quality}</td>
      <td class="num">${l.residual.toFixed(2)}</td>
      <td class="num">${(l.quality+l.residual).toFixed(2)}</td>
    </tr>
  `).join('') || `<tr><td colspan="6" class="empty">No games.</td></tr>`;

  const osiRows = osiLog.map(l => `
    <tr>
      <td class="num">${l.week}</td>
      <td class="team-name">${teamName(l.oppId)}</td>
      <td class="center">${l.result}</td>
      <td class="num">${l.oppSI.toFixed(2)}</td>
      <td class="num">${(l.pct*100).toFixed(0)}%${l.boosted?' <span style="color:var(--gold)">(boost)</span>':''}</td>
      <td class="num">${l.val.toFixed(2)}</td>
    </tr>
  `).join('') || `<tr><td colspan="6" class="empty">No games.</td></tr>`;

  el.innerHTML = `
    <div class="panel">
      <h2>Team detail</h2>
      <div class="form-row">
        <div class="field"><label>Team</label><select id="detailTeamSelect" onchange="selectedDetailTeam=this.value; renderDetailTab();">${options}</select></div>
      </div>
    </div>
    <div class="panel">
      <h2>Power Points breakdown — ${teamName(selectedDetailTeam)} <span style="color:var(--chalk-dim); font-size:13px; text-transform:none;">(${(()=>{const t=state.teams.find(t=>t.id===selectedDetailTeam); return t?sectionLabel(t.region,t.group):'';})()})</span></h2>
      <p class="hint">Residual points are based on each opponent's first 7 games, capped at 18 per game. Final total ÷ ${Math.max(ppLog.length,7)} (min. 7 games).</p>
      <div class="table-scroll">
        <table>
          <thead><tr><th class="num">Wk</th><th>Opponent</th><th class="center">Result</th><th class="num">Quality</th><th class="num">Residual</th><th class="num">Game Total</th></tr></thead>
          <tbody>${ppRows}</tbody>
        </table>
      </div>
    </div>
    <div class="panel">
      <h2>OSI breakdown — ${teamName(selectedDetailTeam)}</h2>
      <p class="hint">Uses opponents' locked (Week 7) Strength Index, floored at 20. "(boost)" = non-public multiplier bonus percentage applied (capped at 2 games/season).</p>
      <div class="table-scroll">
        <table>
          <thead><tr><th class="num">Wk</th><th>Opponent</th><th class="center">Result</th><th class="num">Opp. SI</th><th class="num">% Used</th><th class="num">Value</th></tr></thead>
          <tbody>${osiRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderPredictTab(){
  const el = document.getElementById('tab-predict');
  const allTbdGames = state.games.filter(g => g.scoreA===null || g.scoreA===undefined || g.scoreB===null || g.scoreB===undefined);
  const totalPicked = Object.keys(predictions).length;

  if (!allTbdGames.length){
    el.innerHTML = `<div class="panel"><p class="empty">No upcoming (TBD) games scheduled yet — admin adds these with blank scores on the Games tab.</p></div>`;
    return;
  }

  const tbdGames = allTbdGames
    .filter(g => (predictFilterWeek==='all' || String(g.week)===String(predictFilterWeek)))
    .filter(g => gameMatchesSection(g, predictFilterSection))
    .filter(g => predictFilterSection==='all' || !gameBothIneligible(g)) // hide both-ineligible matchups when viewing a specific section
    .filter(g => gameMatchesEligibilityFilter(g, predictFilterEligibility))
    .filter(g => gameMatchesDivision(g, predictFilterDivision));

  const sorted = [...tbdGames].sort((a,b)=> a.week-b.week);
  const rows = sorted.map(g => {
    const pick = predictions[g.id];
    const btnA = `<button class="${pick===g.teamA?'':'ghost'}" style="${pick===g.teamA?'':'background:transparent;'}" onclick="setPrediction('${g.id}','${g.teamA}')">${teamName(g.teamA)} wins</button>`;
    const btnTie = `<button class="${pick==='TIE'?'':'ghost'}" style="${pick==='TIE'?'':'background:transparent;'}" onclick="setPrediction('${g.id}','TIE')">Tie</button>`;
    const btnB = `<button class="${pick===g.teamB?'':'ghost'}" style="${pick===g.teamB?'':'background:transparent;'}" onclick="setPrediction('${g.id}','${g.teamB}')">${teamName(g.teamB)} wins</button>`;
    return `
      <tr>
        <td class="num">${isThanksgiving(g.week)?'TG':g.week}</td>
        <td class="team-name">
          ${teamName(g.teamA)}${teamInfoBadge(g.teamA)}
          <div style="margin:4px 0; color:var(--chalk-dim); font-size:11px;">vs</div>
          ${teamName(g.teamB)}${teamInfoBadge(g.teamB)}
        </td>
        <td class="center" style="display:flex; gap:6px; justify-content:center; flex-wrap:wrap;">${btnA}${btnTie}${btnB}</td>
        <td class="center">${pick ? `<button class="danger" onclick="clearPrediction('${g.id}')">Clear</button>` : ''}</td>
      </tr>
    `;
  }).join('');
  const rowsOrEmpty = sorted.length ? rows : `<tr><td colspan="4" class="empty">No upcoming games match this filter.</td></tr>`;

  el.innerHTML = `
    <div class="panel">
      <h2>Make Your Predictions</h2>
      <p class="hint">Pick a winner — or a tie — for any upcoming game. A predicted win assumes a flat ${PREDICTION_MARGIN}-point margin for ranking math; a predicted tie is modeled as equal scores, which flows correctly through Power Points (1.5 quality points) and OSI (75%). Your picks are private to you; they only change what <em>you</em> see on the Rankings tab, never the official schedule. Once the admin enters a real result, your pick for that game stops mattering automatically.</p>
      <div class="form-row" style="align-items:center;">
        <div class="field"><label>Week</label><select id="predictWeekFilter" onchange="predictFilterWeek=this.value; renderPredictTab();">${buildWeekFilterOptions(predictFilterWeek)}</select></div>
        <div class="field"><label>Section</label><select id="predictSectionFilter" onchange="predictFilterSection=this.value; renderPredictTab();">${buildSectionFilterOptions(predictFilterSection)}</select></div>
        <div class="field"><label>Division</label><select id="predictDivFilter" onchange="predictFilterDivision=this.value; renderPredictTab();">${buildDivisionFilterOptions(predictFilterDivision)}</select></div>
        <div class="field"><label>Eligibility</label><select id="predictEligFilter" onchange="predictFilterEligibility=this.value; renderPredictTab();">${buildEligibilityFilterOptions(predictFilterEligibility)}</select></div>
      </div>
      <div class="form-row" style="align-items:center;">
        <button class="ghost" onclick="randomizeWeek()" ${predictFilterWeek==='all' ? 'disabled style="opacity:0.4; cursor:not-allowed;"' : ''} title="${predictFilterWeek==='all' ? 'Select a specific week first' : ''}">🎲 Randomize Week ${predictFilterWeek!=='all' ? '('+predictFilterWeek+')' : ''}</button>
        <button class="ghost" onclick="randomizeAllPredictions()">🎲 Randomize All${predictFilterSection!=='all' || predictFilterEligibility!=='all' ? ' (filtered)' : ''}</button>
        <button class="danger" style="margin-left:auto; ${totalPicked?'':'opacity:0.4; cursor:not-allowed;'}" onclick="clearAllPredictions()" ${totalPicked?'':'disabled'}>Clear ALL my predictions (${totalPicked})</button>
      </div>
      <div class="table-scroll">
        <table>
          <thead><tr><th class="num">Wk</th><th>Matchup</th><th class="center">Your Pick</th><th class="center">—</th></tr></thead>
          <tbody>${rowsOrEmpty}</tbody>
        </table>
      </div>
      <div class="legend" style="margin-top:14px;">
        <span>You've picked ${sorted.filter(g=>predictions[g.id]).length} of ${sorted.length} games shown (${totalPicked} total across all weeks/sections)</span>
      </div>
    </div>
  `;
}

async function setPrediction(gameId, teamId){
  if (!currentSession || !currentSession.user) return;
  predictions[gameId] = teamId;
  renderAll();
  const { error } = await sb.from('predictions').upsert(
    { user_id: currentSession.user.id, game_id: gameId, winning_team_id: teamId },
    { onConflict: 'user_id,game_id' }
  );
  if (error) { console.error('Failed to save prediction', error); showToast('Could not save your pick — try again.'); }
}
async function clearPrediction(gameId){
  if (!currentSession || !currentSession.user) return;
  delete predictions[gameId];
  renderAll();
  const { error } = await sb.from('predictions').delete()
    .eq('user_id', currentSession.user.id).eq('game_id', gameId);
  if (error) console.error('Failed to clear prediction', error);
}
async function clearAllPredictions(){
  if (!currentSession || !currentSession.user) return;
  predictions = {};
  renderAll();
  const { error } = await sb.from('predictions').delete().eq('user_id', currentSession.user.id);
  if (error) console.error('Failed to clear predictions', error);
}

async function resolveCoinFlip(key, winnerId){
  if (!isAdmin) return;
  coinFlipResolutions[key] = winnerId;
  renderAll();
  const { error } = await sb.from('coin_flips').upsert({ key, winning_team_id: winnerId }, { onConflict: 'key' });
  if (error) { console.error('Failed to save coin flip', error); showToast('Could not save that — try again.'); }
}
async function resetAllCoinFlips(){
  if (!isAdmin) return;
  coinFlipResolutions = {};
  renderAll();
  const { error } = await sb.from('coin_flips').delete().not('key', 'is', null);
  if (error) console.error('Failed to reset coin flips', error);
}

function tbdGamesMatchingPredictFilters(includeWeekFilter){
  return state.games
    .filter(g => g.scoreA===null || g.scoreA===undefined || g.scoreB===null || g.scoreB===undefined)
    .filter(g => !includeWeekFilter || predictFilterWeek==='all' || String(g.week)===String(predictFilterWeek))
    .filter(g => gameMatchesSection(g, predictFilterSection))
    .filter(g => predictFilterSection==='all' || !gameBothIneligible(g))
    .filter(g => gameMatchesEligibilityFilter(g, predictFilterEligibility))
    .filter(g => gameMatchesDivision(g, predictFilterDivision));
}
async function randomizeWeek(){
  if (predictFilterWeek === 'all') return; // requires a specific week to be selected
  if (!currentSession || !currentSession.user) return;
  const targets = tbdGamesMatchingPredictFilters(true);
  const rows = targets.map(g => {
    const winner = Math.random() < 0.5 ? g.teamA : g.teamB;
    predictions[g.id] = winner;
    return { user_id: currentSession.user.id, game_id: g.id, winning_team_id: winner };
  });
  renderAll();
  if (rows.length){
    const err = await writeInChunks('predictions', rows, { upsert: { onConflict: 'user_id,game_id' } });
    if (err) showToast('Some picks may not have saved — try again.');
  }
}
async function randomizeAllPredictions(){
  // Ignores the Week filter on purpose (that's the "All" in Randomize All) but still
  // respects whatever Section/Eligibility filters are active.
  if (!currentSession || !currentSession.user) return;
  const targets = tbdGamesMatchingPredictFilters(false);
  const rows = targets.map(g => {
    const winner = Math.random() < 0.5 ? g.teamA : g.teamB;
    predictions[g.id] = winner;
    return { user_id: currentSession.user.id, game_id: g.id, winning_team_id: winner };
  });
  renderAll();
  if (rows.length){
    const err = await writeInChunks('predictions', rows, { upsert: { onConflict: 'user_id,game_id' } });
    if (err) showToast('Some picks may not have saved — try again.');
  }
}

function renderAll(){
  renderMaintenance();
  renderSiteMessage();
  renderTeamsTab();
  renderGamesTab();
  renderPredictTab();
  renderResultsTab();
  renderBracketTab();
  renderStandingsTab();
  renderDetailTab();
}

function renderMaintenance(){
  const overlay = document.getElementById('maintenanceOverlay');
  if (!overlay) return;
  // Show the lock screen to NON-admin visitors while maintenance is on. Admins are never
  // locked out — they see the site normally (plus the maintenance controls) so they can work.
  if (maintenanceOn && !isAdmin){
    const msg = (maintenanceMessage || '').trim() || 'The site is briefly down for updates. Please check back in a few minutes.';
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <div style="max-width:460px;">
        <div style="font-family:'Oswald',sans-serif; font-weight:700; text-transform:uppercase; font-size:28px; letter-spacing:0.5px; color:var(--chalk);">NJ Football <span style="color:var(--gold);">Playoff Predictor</span></div>
        <div style="margin-top:20px; font-size:24px;">🔧</div>
        <div style="margin-top:12px; font-size:16px; color:var(--chalk); line-height:1.6;">${escapeHtml(msg)}</div>
        <div style="margin-top:20px; font-size:12px; color:var(--chalk-dim);">Updating rankings — back shortly.</div>
      </div>`;
  } else {
    overlay.style.display = 'none';
    overlay.innerHTML = '';
  }
}

function renderSiteMessage(){
  const banner = document.getElementById('siteMessageBanner');
  const editor = document.getElementById('siteMessageEditor');
  if (!banner || !editor) return;

  // Public banner: shows only when there's a non-empty message.
  const msg = (siteMessage || '').trim();
  if (msg){
    banner.style.display = 'block';
    banner.innerHTML = `
      <div style="background:rgba(201,162,39,0.12); border:1px solid var(--gold-dim); border-left:4px solid var(--gold); border-radius:4px; padding:12px 16px; margin-bottom:14px; color:var(--chalk); font-size:14px; line-height:1.5;">
        <span style="color:var(--gold); font-weight:600; font-family:'Oswald',sans-serif; text-transform:uppercase; font-size:12px; letter-spacing:0.5px; display:block; margin-bottom:4px;">Announcement</span>
        ${escapeHtml(msg)}
      </div>`;
  } else {
    banner.style.display = 'none';
    banner.innerHTML = '';
  }

  // Admin editor: only visible when logged in.
  if (isAdmin){
    editor.style.display = 'block';
    editor.innerHTML = `
      <div class="panel">
        <h2>Public Announcement <span style="color:var(--gold); font-size:11px; text-transform:none; letter-spacing:0;">(admin only)</span></h2>
        <p class="hint">Whatever you type here shows as a banner at the top of the site for every visitor. Leave it blank and save to remove the banner.</p>
        <textarea id="siteMessageInput" rows="3" style="width:100%; background:var(--panel-raised); border:1px solid var(--line); color:var(--chalk); border-radius:4px; padding:10px; font-family:'Inter',sans-serif; font-size:13px;" placeholder="e.g. Week 8 rankings are now final.">${escapeHtml(siteMessage || '')}</textarea>
        <div class="form-row" style="margin-top:10px;">
          <button onclick="saveSiteMessage()">Save announcement</button>
          <button class="ghost" onclick="clearSiteMessage()">Clear banner</button>
        </div>
      </div>
      <div class="panel" style="border-color:${maintenanceOn ? 'var(--gold)' : 'var(--line)'};">
        <h2>Maintenance Mode <span style="color:var(--gold); font-size:11px; text-transform:none; letter-spacing:0;">(admin only)</span> ${maintenanceOn ? '<span class="jump-tag" style="color:var(--gold);">● CURRENTLY ON</span>' : ''}</h2>
        <p class="hint">When ON, visitors see a "down for updates" lock screen instead of the site — useful while you enter results or reassign sections so nobody sees half-finished numbers. <strong>You (admin) are never locked out</strong> — you keep full access while it's on. Remember to turn it back OFF when you're done.</p>
        <textarea id="maintenanceMsgInput" rows="2" style="width:100%; background:var(--panel-raised); border:1px solid var(--line); color:var(--chalk); border-radius:4px; padding:10px; font-family:'Inter',sans-serif; font-size:13px;" placeholder="Optional custom message (defaults to a generic 'back soon' note).">${escapeHtml(maintenanceMessage || '')}</textarea>
        <div class="form-row" style="margin-top:10px; align-items:center;">
          ${maintenanceOn
            ? `<button onclick="setMaintenance(false)">Turn OFF — reopen site to visitors</button>`
            : `<button class="danger" onclick="setMaintenance(true)">Turn ON — lock site for visitors</button>`
          }
          <button class="ghost" onclick="saveMaintenanceMessage()">Save message only</button>
        </div>
      </div>`;
  } else {
    editor.style.display = 'none';
    editor.innerHTML = '';
  }
}

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function saveSiteMessage(){
  if (!isAdmin) return;
  const input = document.getElementById('siteMessageInput');
  const newMsg = input ? input.value : '';
  siteMessage = newMsg;
  renderSiteMessage();
  const { error } = await sb.from('site_message').update({ message: newMsg, updated_at: new Date().toISOString() }).eq('id', 1);
  if (error) { console.error('Failed to save announcement', error); showToast('Could not save announcement — try again.'); }
  else showToast('Announcement saved.');
}
async function clearSiteMessage(){
  if (!isAdmin) return;
  siteMessage = '';
  renderSiteMessage();
  const { error } = await sb.from('site_message').update({ message: '', updated_at: new Date().toISOString() }).eq('id', 1);
  if (error) { console.error('Failed to clear announcement', error); showToast('Could not clear — try again.'); }
  else showToast('Banner cleared.');
}

async function setMaintenance(on){
  if (!isAdmin) return;
  const input = document.getElementById('maintenanceMsgInput');
  if (input) maintenanceMessage = input.value;
  maintenanceOn = on;

async function bulkSetConferenceDivision(){
  if (!isAdmin) return;
  const textEl = document.getElementById('bulkConfDivInput');
  const lines = textEl.value.split('\n').map(l=>l.trim()).filter(l=>l.length);

  const teamByName = {};
  state.teams.forEach(t => { teamByName[t.name.toLowerCase()] = t; });

  let updates = [], errors = [];
  lines.forEach((line, idx) => {
    const lineNum = idx + 1;
    if (/^team\b/i.test(line)) return; // skip an optional header row
    // Format: team name, conference, division
    const fields = (line.includes('\t') ? line.split('\t') : line.split(',')).map(f=>f.trim());
    if (fields.length < 3) { errors.push(`Line ${lineNum}: needs "team name, conference, division"`); return; }
    // Team name may itself contain commas (co-ops); conference+division are the LAST two fields.
    const division = fields[fields.length-1];
    const conference = fields[fields.length-2];
    const name = fields.slice(0, fields.length-2).join(',').trim();
    if (!conference || !division) { errors.push(`Line ${lineNum}: conference and division can't be blank`); return; }
    const team = teamByName[name.toLowerCase()];
    if (!team) { errors.push(`Line ${lineNum}: team "${name}" not found`); return; }
    if (team.isOutOfState) { errors.push(`Line ${lineNum}: "${name}" is out-of-state and has no division`); return; }
    team.conference = conference;
    team.division = division;
    updates.push({ id: team.id, conference, division });
  });

  let dbError = null;
  for (const u of updates){
    const { error } = await sb.from('teams').update({ conference: u.conference, division: u.division }).eq('id', u.id);
    if (error){ dbError = error; break; }
  }
  if (dbError) errors.push('⚠ Database write failed: ' + dbError.message);

  const log = [`Updated conference/division for ${updates.length} team(s).`];
  if (errors.length) log.push(`⚠ ${errors.length} line(s) had issues:`, ...errors.map(e=>'&nbsp;&nbsp;'+e));
  const keepText = errors.length > 0;
  renderAll();
  const liveStatus = document.getElementById('bulkConfDivStatus');
  if (liveStatus) { liveStatus.style.display='block'; liveStatus.innerHTML = log.join('<br>'); }
  const liveText = document.getElementById('bulkConfDivInput');
  if (liveText && !keepText) liveText.value = '';
}

async function bulkSetSection(){
  if (!isAdmin) return;
  const textEl = document.getElementById('bulkSectionInput');
  const lines = textEl.value.split('\n').map(l=>l.trim()).filter(l=>l.length);

  const teamByName = {};
  state.teams.forEach(t => { teamByName[t.name.toLowerCase()] = t; });

  // Accept a range of section spellings and map them to a canonical {region, group}.
  function parseSectionText(raw){
    const s = raw.toLowerCase().replace(/[.\-_]/g,' ').replace(/\s+/g,' ').trim();
    if (/non ?public a|np ?a|nonpublic a/.test(s)) return { region:null, group:'NPA' };
    if (/non ?public b|np ?b|nonpublic b/.test(s)) return { region:null, group:'NPB' };
    // Handle compact shorthand like "n3" / "s5" (no space between letter and digit).
    const compact = s.match(/^([ns])\s*([1-5])$/);
    if (compact){
      return { region: compact[1]==='n' ? 'North' : 'South', group: compact[2] };
    }
    const north = /\bnorth\b/.test(s) || /^n\b/.test(s);
    const south = /\bsouth\b/.test(s) || /^s\b/.test(s);
    const gm = s.match(/(?:group\s*)?([1-5])\b/);
    if ((north || south) && gm){
      return { region: north ? 'North' : 'South', group: gm[1] };
    }
    return null;
  }

  let updates = [], errors = [];
  lines.forEach((line, idx) => {
    const lineNum = idx + 1;
    if (/^team\b/i.test(line)) return;
    const fields = (line.includes('\t') ? line.split('\t') : line.split(',')).map(f=>f.trim());
    if (fields.length < 2) { errors.push(`Line ${lineNum}: needs "team name, section"`); return; }
    const sectionText = fields[fields.length-1];
    const name = fields.slice(0, -1).join(',').trim();
    const team = teamByName[name.toLowerCase()];
    if (!team) { errors.push(`Line ${lineNum}: team "${name}" not found`); return; }
    if (team.isOutOfState) { errors.push(`Line ${lineNum}: "${name}" is out-of-state and has no section`); return; }
    const parsed = parseSectionText(sectionText);
    if (!parsed) { errors.push(`Line ${lineNum}: couldn't read section "${sectionText}" — use e.g. "North, Group 3", "South 5", "Non-Public A"`); return; }
    team.region = parsed.region;
    team.group = parsed.group;
    updates.push({ id: team.id, region: parsed.region, team_group: parsed.group });
  });

  let dbError = null;
  if (updates.length){
    // Use per-row updates (not upsert) since we're only changing two columns and don't
    // want to risk an upsert treating a partial row as an insert.
    for (const u of updates){
      const { error } = await sb.from('teams').update({ region: u.region, team_group: u.team_group }).eq('id', u.id);
      if (error){ dbError = error; break; }
    }
    if (dbError) errors.push('⚠ Database write failed: ' + dbError.message);
  }
  const log = [`Updated section for ${updates.length} team(s).`];
  if (errors.length) log.push(`⚠ ${errors.length} line(s) had issues:`, ...errors.map(e=>'&nbsp;&nbsp;'+e));
  const keepText = errors.length > 0;
  renderAll();
  const liveStatus = document.getElementById('bulkSectionStatus');
  if (liveStatus) { liveStatus.style.display='block'; liveStatus.innerHTML = log.join('<br>'); }
  const liveText = document.getElementById('bulkSectionInput');
  if (liveText && !keepText) liveText.value = '';
}

async function bulkAddGames(){
  if (!isAdmin) return;
  const textEl = document.getElementById('bulkGamesInput');
  const statusEl = document.getElementById('bulkAddStatus');
  const raw = textEl.value;
  const lines = raw.split('\n').map(l=>l.trim()).filter(l=>l.length);

  const nameToId = {};
  state.teams.forEach(t => { nameToId[t.name.toLowerCase()] = t.id; });

  // denied entries collect { line, content, reason } so the admin sees exactly what/why.
  let newGames = [], denied = [], addedCount = 0;
  lines.forEach((line, idx) => {
    const lineNum = idx + 1;
    if (/^week\b/i.test(line)) return; // skip an optional header row
    const fields = (line.includes('\t') ? line.split('\t') : line.split(',')).map(f=>f.trim());
    if (fields.length < 3) { denied.push({line:lineNum, content:line, reason:'needs at least: week, team A, team B'}); return; }
    // Week may be a number 0-11, or the literal "Thanksgiving" (case-insensitive).
    let week;
    if (/^thanksgiving$/i.test(fields[0])) week = THANKSGIVING;
    else {
      week = parseInt(fields[0], 10);
      if (isNaN(week)) { denied.push({line:lineNum, content:line, reason:`"${fields[0]}" isn't a valid week number (use a number or "Thanksgiving")`}); return; }
    }
    const teamAId = nameToId[fields[1].toLowerCase()];
    const teamBId = nameToId[fields[2].toLowerCase()];
    if (!teamAId && !teamBId) { denied.push({line:lineNum, content:line, reason:`neither team found: "${fields[1]}" and "${fields[2]}"`}); return; }
    if (!teamAId) { denied.push({line:lineNum, content:line, reason:`team not found: "${fields[1]}"`}); return; }
    if (!teamBId) { denied.push({line:lineNum, content:line, reason:`team not found: "${fields[2]}"`}); return; }
    if (teamAId === teamBId) { denied.push({line:lineNum, content:line, reason:`a team can't play itself ("${fields[1]}")`}); return; }
    let scoreA = null, scoreB = null;
    if (fields.length >= 5 && fields[3] !== '' && fields[4] !== '') {
      const a = parseInt(fields[3],10), b = parseInt(fields[4],10);
      if (!isNaN(a) && !isNaN(b)) { scoreA = a; scoreB = b; }
      else { denied.push({line:lineNum, content:line, reason:`scores "${fields[3]}" / "${fields[4]}" aren't both valid numbers`}); return; }
    }
    const nameA = state.teams.find(t=>t.id===teamAId).name;
    const nameB = state.teams.find(t=>t.id===teamBId).name;
    const dupExisting = state.games.some(g => g.week===week &&
      ((g.teamA===teamAId && g.teamB===teamBId) || (g.teamA===teamBId && g.teamB===teamAId)));
    if (dupExisting) { denied.push({line:lineNum, content:line, reason:`already in the schedule: ${nameA} vs ${nameB}, Week ${week}`}); return; }
    const dupInBatch = newGames.some(g => g.week===week && ((g.teamA===teamAId&&g.teamB===teamBId)||(g.teamA===teamBId&&g.teamB===teamAId)));
    if (dupInBatch) { denied.push({line:lineNum, content:line, reason:`duplicated earlier in this same paste: ${nameA} vs ${nameB}, Week ${week}`}); return; }
    newGames.push({id: uid('g'), week, teamA: teamAId, teamB: teamBId, scoreA, scoreB});
  });

  // Persist the new games first (before re-rendering), so state and DB agree.
  newGames.forEach(g => state.games.push(g));
  let writeError = null;
  if (newGames.length){
    writeError = await writeInChunks('games', newGames.map(localGameToDb));
  }
  addedCount = newGames.length;

  // Build the results report text.
  const log = [`<strong>Added ${addedCount} game(s).</strong>`];
  if (writeError){
    log.push(`<span style="color:var(--red);">⚠ Database write failed — these may not have saved: ${writeError.message}</span>`);
  }
  if (denied.length){
    log.push(`<br><strong style="color:var(--gold);">${denied.length} line(s) were not added:</strong>`);
    denied.forEach(d => {
      log.push(`<div style="margin:4px 0; padding-left:8px; border-left:2px solid var(--line);"><span style="color:var(--chalk-dim);">Line ${d.line}:</span> <code>${escapeHtml(d.content)}</code><br><span style="color:var(--red); font-size:11.5px;">↳ ${escapeHtml(d.reason)}</span></div>`);
    });
  } else if (addedCount > 0) {
    log.push(`<span style="color:var(--turf-bright);">All lines added cleanly.</span>`);
  }

  // Decide whether to keep the pasted text (so the admin can fix rejected lines and retry).
  const keepText = !(addedCount > 0 && denied.length === 0 && !writeError);

  // Re-render the whole app to reflect the newly added games.
  renderAll();

  // renderAll() rebuilt the Games tab from scratch, so re-fetch the live elements
  // (the originals captured at the top of this function are now detached) and write to them.
  const liveStatusEl = document.getElementById('bulkAddStatus');
  if (liveStatusEl) { liveStatusEl.style.display='block'; liveStatusEl.innerHTML = log.join(''); }
  const liveTextEl = document.getElementById('bulkGamesInput');
  if (liveTextEl && keepText) liveTextEl.value = raw;
}

function toggleWipeConfirm(){
  const checked = document.getElementById('wipeConfirmCheck').checked;
  const btn = document.getElementById('wipeScheduleBtn');
  btn.disabled = !checked;
  btn.style.opacity = checked ? '1' : '0.4';
  btn.style.cursor = checked ? 'pointer' : 'not-allowed';
}
async function wipeEntireSchedule(){
  if (!isAdmin) return;
  const checkbox = document.getElementById('wipeConfirmCheck');
  if (!checkbox || !checkbox.checked) return;
  state.games = [];
  checkbox.checked = false;
  renderAll();
  const { error } = await sb.from('games').delete().gte('week', 0);
  if (error) { console.error('Failed to wipe schedule', error); showToast('Wipe failed — try again.'); }
}

function openDetail(teamId){
  selectedDetailTeam = teamId;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.tab[data-tab="detail"]').classList.add('active');
  document.querySelectorAll('.tabview').forEach(v=>v.style.display='none');
  document.getElementById('tab-detail').style.display='block';
  renderDetailTab();
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tabview').forEach(v=>v.style.display='none');
    document.getElementById('tab-'+btn.dataset.tab).style.display='block';
  });
});

document.querySelectorAll('.tabview').forEach(v => {
  v.innerHTML = `<div class="panel"><p class="empty">Loading…</p></div>`;
});
bootstrap();
</script>
</body>
</html>
