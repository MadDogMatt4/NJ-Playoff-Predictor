async function submitAdminLogin(){
  const emailEl = document.getElementById('adminEmailInput');
  const pwEl = document.getElementById('adminPasswordInput');
  const errEl = document.getElementById('adminError');
  errEl.style.display = 'none';
  const { data, error } = await sb.auth.signInWithPassword({ email: emailEl.value.trim(), password: pwEl.value });
  if (error){
    errEl.textContent = 'Login failed: ' + error.message;
    errEl.style.display = 'inline';
    return;
  }
  currentSession = data.session;
  const admin = await checkIsAdmin();
  if (!admin){
    errEl.textContent = "That account isn't on the admins list.";
    errEl.style.display = 'inline';
    await sb.auth.signOut();
    await ensureSession();
    return;
  }
  pwEl.value = '';
  document.getElementById('adminControl').style.display = 'none';
  document.getElementById('adminBar').style.display = 'flex';
  await loadAllData();
}
async function logoutAdmin(){
  isAdmin = false;
  await sb.auth.signOut();
  await ensureSession();
  document.getElementById('adminControl').style.display = 'flex';
  document.getElementById('adminBar').style.display = 'none';
  await loadAllData();
}

// Ensures there's always an active Supabase session — a real admin login if one
// exists, otherwise a fresh anonymous session so visitors can still make private
// predictions without creating an account.
async function ensureSession(){
  const { data } = await sb.auth.getSession();
  if (data.session){
    currentSession = data.session;
    return;
  }
  const { data: anonData, error } = await sb.auth.signInAnonymously();
  if (error){ console.error('Anonymous sign-in failed', error); return; }
  currentSession = anonData.session;
}
async function checkIsAdmin(){
  if (!currentSession || !currentSession.user || !currentSession.user.email){ isAdmin = false; return false; }
  const { data, error } = await sb.from('admins').select('email').eq('email', currentSession.user.email).maybeSingle();
  isAdmin = !error && !!data;
  return isAdmin;
}

}
function sectionLabel(region, group){
  if (group === 'NPA') return 'Non-Public A';
  if (group === 'NPB') return 'Non-Public B';
  if (group === 'OOS') return 'Out-of-State / Non-Member';

/* ============================== DB <-> LOCAL MAPPING ============================== */
// The DB uses snake_case columns (and "team_group" instead of the reserved word "group");
// these convert to/from the camelCase shape the rest of the app already expects.

function dbTeamToLocal(row){
  return {
    id: row.id, name: row.name, category: row.category,
    region: row.region, group: row.team_group,
    startSI: row.start_si, ineligible: row.ineligible,
    isOutOfState: row.is_out_of_state,
    manualRecord: row.manual_record || { w:0, t:0, l:0 },
    northing: (row.northing === null || row.northing === undefined) ? null : row.northing
  };
}
function localTeamToDb(t){
  return {
    id: t.id, name: t.name, category: t.category,
    region: t.region, team_group: t.group,
    start_si: t.startSI, ineligible: t.ineligible,
    is_out_of_state: t.isOutOfState, manual_record: t.manualRecord,
    northing: (t.northing === null || t.northing === undefined) ? null : t.northing
  };
}
function dbGameToLocal(row){
  return { id: row.id, week: row.week, teamA: row.team_a, teamB: row.team_b, scoreA: row.score_a, scoreB: row.score_b };
}
function localGameToDb(g){
  return { id: g.id, week: g.week, team_a: g.teamA, team_b: g.teamB, score_a: g.scoreA, score_b: g.scoreB };
}

    sb.from('site_message').select('message').eq('id', 1).maybeSingle()
  ]);
  if (teamsRes.error) console.error('Failed to load teams', teamsRes.error);
  if (gamesRes.error) console.error('Failed to load games', gamesRes.error);
  if (coinFlipsRes.error) console.error('Failed to load coin flips', coinFlipsRes.error);
  if (msgRes && msgRes.error) console.error('Failed to load site message', msgRes.error);

  state.teams = (teamsRes.data || []).map(dbTeamToLocal);
  state.games = (gamesRes.data || []).map(dbGameToLocal);
  coinFlipResolutions = {};
  (coinFlipsRes.data || []).forEach(r => { coinFlipResolutions[r.key] = r.winning_team_id; });
  siteMessage = (msgRes && msgRes.data && msgRes.data.message) ? msgRes.data.message : '';

  // Recompute id counters from loaded data so new additions don't collide.
  state.teams.forEach(t => { const n = parseInt(t.id.slice(1),10); if (n >= nextTeamId) nextTeamId = n+1; });
  state.games.forEach(g => { const n = parseInt(g.id.slice(1),10); if (n >= nextGameId) nextGameId = n+1; });

  // Personal predictions — scoped to this visitor's session (anonymous or logged-in).
  predictions = {};
  if (currentSession && currentSession.user){
    const predRes = await sb.from('predictions').select('*').eq('user_id', currentSession.user.id);
    if (predRes.error) console.error('Failed to load predictions', predRes.error);
    (predRes.data || []).forEach(r => { predictions[r.game_id] = r.winning_team_id; });
  }

  dataLoaded = true;
  renderAll();
}

async function bootstrap(){
  await ensureSession();
  await checkIsAdmin();
  if (isAdmin){
    document.getElementById('adminControl').style.display = 'none';
    document.getElementById('adminBar').style.display = 'flex';
  }
  await loadAllData();
}

/* ============================== PREDICTIONS OVERLAY ============================== */

// Merges official (admin-entered) results with THIS viewer's own predictions for any
// still-TBD games. Predictions never touch shared/official data — they only affect what
// this function returns, which feeds every downstream calculation for this viewer's session.
function effectiveGames(){
  return state.games.map(g => {
    if (g.scoreA !== null && g.scoreA !== undefined && g.scoreB !== null && g.scoreB !== undefined) return g;
    const pick = predictions[g.id];
    if (!pick) return null; // no official result and no prediction — doesn't count yet
    const scoreA = pick === g.teamA ? PREDICTION_MARGIN : 0;
    const scoreB = pick === g.teamB ? PREDICTION_MARGIN : 0;
    return {...g, scoreA, scoreB, isProjected: true};
  }).filter(Boolean);
}
function hasAnyProjectedGames(){
  return effectiveGames().some(g => g.isProjected);
}

/* ============================== TIER 1: STRENGTH INDEX ============================== */

// Compute each team's SI trajectory week by week, frozen after week 7.
// Returns { lockedSI: {teamId: number}, weeklyRecordThruWeek: helper data }
function computeStrengthIndex(){
  const teams = state.teams;
  const teamById = {};
  teams.forEach(t => teamById[t.id] = t);
  const startSI = {};
  teams.forEach(t => startSI[t.id] = (typeof t.startSI === 'number') ? t.startSI : 60);
  let currentSI = {...startSI};

  const gamesByWeek = {};
  effectiveGames().forEach(g => {
    gamesByWeek[g.week] = gamesByWeek[g.week] || [];
    gamesByWeek[g.week].push(g);
  });
  const weeks = Object.keys(gamesByWeek).map(Number).sort((a,b)=>a-b);

  weeks.forEach(w => {
    if (w > 7) return; // SI frozen after week 7
    const snapshot = {...currentSI};
    const deltas = {};
    gamesByWeek[w].forEach(g => {
      const siA = snapshot[g.teamA], siB = snapshot[g.teamB];
      const expectedDiff = siA - siB;          // positive => A favored
      const actualDiff = g.scoreA - g.scoreB;  // positive => A won by this much
      const diffFromExpected = actualDiff - expectedDiff;
      const delta = diffFromExpected * 0.2;    // A moves by this (can be +/-), B moves opposite
      // Out-of-state/non-member opponents' SI is assigned externally (MaxPreps-based
      // comparison), never moved by our internal weekly formula — only the NJ side moves.
      if (!teamById[g.teamA].isOutOfState) deltas[g.teamA] = (deltas[g.teamA]||0) + delta;
      if (!teamById[g.teamB].isOutOfState) deltas[g.teamB] = (deltas[g.teamB]||0) - delta;
    });
    Object.keys(deltas).forEach(tid => { currentSI[tid] = snapshot[tid] + deltas[tid]; });
  });

  const lockedSI = {};
  teams.forEach(t => {
    lockedSI[t.id] = Math.max(currentSI[t.id], 0); // raw locked value (no floor yet)
  });
  // Floor of 20 applies "for purposes of OSI calc only" — keep raw + floored separately
  const lockedSI_floored = {};
  teams.forEach(t => { lockedSI_floored[t.id] = Math.max(lockedSI[t.id], 20); });

  return { lockedSI, lockedSI_floored };
}

/* ============================== TIER 2: MULTIPLIER STATUS ============================== */

// Determine each team's FINAL effective category, walking games in week order.
// Per ruling confirmed: demotion/removal effects are retroactive — final status
// is applied to ALL games against that team for OSI purposes.
function computeFinalCategories(){
  const teams = state.teams;
  const finalCat = {};
  teams.forEach(t => finalCat[t.id] = t.category);

  const sorted = [...effectiveGames()].sort((a,b)=>a.week-b.week);
  sorted.forEach(g => {
    if (g.week > 8) return; // rule window is Weeks 0-8
    [[g.teamA,g.teamB,g.scoreA,g.scoreB],[g.teamB,g.teamA,g.scoreB,g.scoreA]].forEach(([selfId,oppId,selfScore,oppScore]) => {
      const oppCatAtStart = state.teams.find(t=>t.id===oppId).category; // base category for "non-multiplier" check
      const lost = selfScore < oppScore;
      if (!lost) return;
      if (oppCatAtStart !== null) return; // only demoted by losing to a NON-multiplier school
      const cur = finalCat[selfId];
      if (cur === 'A' || cur === 'B' || cur === 'C') {
        finalCat[selfId] = 'D';
      } else if (cur === 'D') {
        finalCat[selfId] = null;
      }
    });
  });
  return finalCat;
}

/* ============================== TIER 3: POWER POINTS ============================== */

function teamGames(teamId){
  return effectiveGames().filter(g => g.teamA===teamId || g.teamB===teamId)
    .sort((a,b)=>a.week-b.week)
    .map(g => {
      const isA = g.teamA===teamId;
      const oppId = isA? g.teamB : g.teamA;
      const selfScore = isA? g.scoreA : g.scoreB;
      const oppScore = isA? g.scoreB : g.scoreA;
      let result = 'L';
      if (selfScore>oppScore) result='W'; else if (selfScore===oppScore) result='T';
      return {...g, oppId, selfScore, oppScore, result};
    });
}

function recordThruFirstN(teamId, n){
  const team = state.teams.find(t=>t.id===teamId);
  if (team && team.isOutOfState){
    // We don't track their actual schedule — record through their first 7 games is
    // entered manually (per the regs, Power Points use the out-of-state opponent's
    // first 7 games, sourced externally rather than computed from our game log).
    const mr = team.manualRecord || {w:0,t:0,l:0};
    return {w:mr.w, t:mr.t, l:mr.l, played: mr.w+mr.t+mr.l};
  }
  const gl = teamGames(teamId).slice(0, n);
  let w=0,t=0,l=0;
  gl.forEach(g => { if(g.result==='W')w++; else if(g.result==='T')t++; else l++; });
  return {w,t,l,played:gl.length};
}

// Residual points lookup table per the regs.
function residualPoints(selfResult, oppResult){
  // selfResult: result of the A-vs-B game from A's perspective ('W','T','L')
  // oppResult: opponent's (B's) result in ONE of their first-7 games being tallied
  const table = {
    W: { W:3, T:1.5, L:0 },
    T: { W:1.5, T:0.75, L:0 },
    L: { W:1, T:0, L:0 }
  };
  return table[selfResult][oppResult];
}

function computePowerPoints(){
  const teams = state.teams;
  const ppTotal = {};
  const ppGameLog = {}; // for detail view

  teams.forEach(t => {
    const gl = teamGames(t.id);
    let total = 0;
    const log = [];
    gl.forEach(g => {
      const quality = g.result==='W'?6 : g.result==='T'?1.5 : 0;
      const oppRecord = recordThruFirstN(g.oppId, 7);
      let residual = 0;
      // Sum residual across each of opponent's first-7 game outcomes, per result-branch table, capped at 18
      residual += oppRecord.w * residualPoints(g.result,'W');
      residual += oppRecord.t * residualPoints(g.result,'T');
      // losses contribute 0 in every branch — skip
      residual = Math.min(residual, 18);
      total += quality + residual;
      log.push({week:g.week, oppId:g.oppId, result:g.result, quality, residual, oppRecord});
    });
    const divisor = Math.max(gl.length, 7);
    ppTotal[t.id] = gl.length ? total/divisor : 0;
    ppGameLog[t.id] = log;
  });
  return { ppTotal, ppGameLog };
}

/* ============================== TIER 4: OSI ============================== */

function computeOSI(lockedSI_floored, finalCat){
  const teams = state.teams;
  const osiTotal = {};
  const osiGameLog = {};

  teams.forEach(t => {
    const gl = teamGames(t.id);
    const selfIsMultiplier = finalCat[t.id] !== null && finalCat[t.id] !== undefined;

    // Identify candidate "bonus" games: this team LOST to a multiplier opponent, and this team itself is non-multiplier.
    const bonusCandidates = [];
    gl.forEach((g, idx) => {
      const oppMultCat = finalCat[g.oppId];
      if (!selfIsMultiplier && g.result==='L' && oppMultCat) {
        const bonusPct = MULTIPLIER_PCT[oppMultCat];
        const oppSI = lockedSI_floored[g.oppId];
        bonusCandidates.push({ idx, value: oppSI*bonusPct, pct: bonusPct });
      }
    });
    bonusCandidates.sort((a,b)=>b.value-a.value);
    const boostedIdxSet = new Set(bonusCandidates.slice(0,2).map(c=>c.idx));

    let total = 0;
    const log = [];
    gl.forEach((g, idx) => {
      const oppSI = lockedSI_floored[g.oppId];
      let pct;
      if (g.result==='W') pct = 1.0;
      else if (g.result==='T') pct = 0.75;
      else { // Loss
        if (boostedIdxSet.has(idx)) {
          pct = MULTIPLIER_PCT[finalCat[g.oppId]];
        } else {
          pct = 0.50;
        }
      }
      const val = oppSI*pct;
      total += val;
      log.push({week:g.week, oppId:g.oppId, result:g.result, oppSI, pct, val, boosted:boostedIdxSet.has(idx)});
    });
    const divisor = Math.max(gl.length, 7);
    osiTotal[t.id] = gl.length ? total/divisor : 0;
    osiGameLog[t.id] = log;
  });
  return { osiTotal, osiGameLog };
}

/* ============================== TIER 5: UPR RANK-BLEND ============================== */

function getAllSections(){
  const seen = new Map();
  state.teams.forEach(t => {
    if (t.isOutOfState) return; // OOS opponents are never a rankable section
    const key = sectionKey(t.region, t.group);
    if (!seen.has(key)) seen.set(key, {region:t.region, group:t.group, label:sectionLabel(t.region,t.group)});
  });
  const rank = s => {
    if (s.group==='NPA') return 1000;
    if (s.group==='NPB') return 1001;
    return (s.region==='North'?0:100) + Number(s.group);
  };
  return [...seen.values()].sort((a,b)=> rank(a)-rank(b));
}

function gameMatchesSection(g, sectionFilterKey){
  if (!sectionFilterKey || sectionFilterKey === 'all') return true;
  const tA = state.teams.find(t=>t.id===g.teamA);
  const tB = state.teams.find(t=>t.id===g.teamB);
  return (tA && sectionKey(tA.region,tA.group)===sectionFilterKey) ||
         (tB && sectionKey(tB.region,tB.group)===sectionFilterKey);
}
function gameBothIneligible(g){
  // Out-of-state/non-member opponents are always flagged ineligible by design (they're not
  // an NJ playoff team at all, not a "non-eligible NJ team") — never treat those as a
  // both-ineligible matchup, since the game itself is still meaningful schedule info.
  const tA = state.teams.find(t=>t.id===g.teamA);
  const tB = state.teams.find(t=>t.id===g.teamB);
  if (!tA || !tB) return false;
  if (tA.isOutOfState || tB.isOutOfState) return false;
  return !!tA.ineligible && !!tB.ineligible;
}
function gameMatchesEligibilityFilter(g, filter){
  if (!filter || filter === 'all') return true;
  const tA = state.teams.find(t=>t.id===g.teamA);
  const tB = state.teams.find(t=>t.id===g.teamB);
  const anyIneligible = (tA && tA.ineligible) || (tB && tB.ineligible);
  if (filter === 'eligible') return !anyIneligible;
  if (filter === 'noneligible') return anyIneligible;
  return true;
}
function buildEligibilityFilterOptions(selected){
  return `
    <option value="all" ${selected==='all'?'selected':''}>All games</option>
    <option value="eligible" ${selected==='eligible'?'selected':''}>Only eligible matchups</option>
    <option value="noneligible" ${selected==='noneligible'?'selected':''}>Only non-eligible matchups</option>
  `;
}
function getAllWeeksUsed(){
  const weeks = new Set(state.games.map(g=>g.week));
  return [...weeks].sort((a,b)=>a-b);
}
function buildWeekFilterOptions(selected){
  const weeks = getAllWeeksUsed();
  const opts = [`<option value="all" ${selected==='all'?'selected':''}>All weeks</option>`];
  weeks.forEach(w => opts.push(`<option value="${w}" ${String(selected)===String(w)?'selected':''}>Week ${w}</option>`));
  return opts.join('');
}
function buildSectionFilterOptions(selected){
  const sections = getAllSections();
  const opts = [`<option value="all" ${selected==='all'?'selected':''}>All sections</option>`];
  sections.forEach(s => {
    const key = sectionKey(s.region, s.group);
    opts.push(`<option value="${key}" ${selected===key?'selected':''}>${s.label}</option>`);
  });
  return opts.join('');
}

/* ============================== TIEBREAKER ENGINE ============================== */
// Implements the official 5-step order: Head-to-Head, Common Opponents, OSI, Power
// Points, Coin Flip. Per the regs, criteria restart at #1 each time a single team is
// peeled off the top of a tied group — this engine does that literally: repeatedly find
// the next-best team among whoever's still unresolved, removing them one at a time.

function groupKeyFor(teamIds){
  return [...teamIds].sort().join(',');
}

function recordVsSet(teamId, oppIdSet){
  const games = teamGames(teamId).filter(g => oppIdSet.has(g.oppId));
  let w=0,l=0,t=0;
  games.forEach(g => { if (g.result==='W') w++; else if (g.result==='T') t++; else l++; });
  const n = w+l+t;
  return { w, l, t, games: n, pct: n>0 ? (w + 0.5*t)/n : null };
}

// Finds the single next-best team among `remaining` (a subset still needing to be placed).
// `originalGroupIds` = full set of teams that were tied at the UPR-score level, used to
// exclude internal group members when computing "common opponents" (those are external).
function pickNextBest(remaining, originalGroupIds, osiTotal, ppTotal){
  if (remaining.length === 1) return { winner: remaining[0] };

  // Step 1: Head-to-Head — record against other teams still in `remaining`.
  const remainingIds = new Set(remaining.map(t=>t.id));
  let scored = remaining.map(t => {
    const others = new Set([...remainingIds].filter(id=>id!==t.id));
    return { t, rec: recordVsSet(t.id, others) };
  });
  let withData = scored.filter(s => s.rec.games > 0);
  let candidates = remaining;
  if (withData.length){
    const maxPct = Math.max(...withData.map(s=>s.rec.pct));
    const top = withData.filter(s => Math.abs(s.rec.pct - maxPct) < 1e-9).map(s=>s.t);
    if (top.length === 1) return { winner: top[0], step: 'Head-to-Head' };
    candidates = top;
  }

  // Step 2: Common Opponents — opponents played by EVERY team in `candidates`,
  // excluding anyone who was part of the original tied group (those are "internal").
  const oppSets = candidates.map(t => new Set(teamGames(t.id).map(g=>g.oppId).filter(id=>!originalGroupIds.has(id))));
  let common = oppSets[0] ? new Set(oppSets[0]) : new Set();
  oppSets.slice(1).forEach(s => { common = new Set([...common].filter(id=>s.has(id))); });
  if (common.size){
    const recs = candidates.map(t => ({ t, rec: recordVsSet(t.id, common) }));
    const withGames = recs.filter(r => r.rec.games > 0);
    if (withGames.length){
      const maxPct = Math.max(...withGames.map(r=>r.rec.pct));
      const top = withGames.filter(r => Math.abs(r.rec.pct - maxPct) < 1e-9).map(r=>r.t);
      if (top.length === 1) return { winner: top[0], step: 'Common Opponents' };
      if (top.length) candidates = top;
    }
  }

  // Step 3: OSI — compares the actual computed OSI value (not the assigned rank), since
  // rank is always a unique 1..N permutation and would trivially "resolve" every tie.
  {
    const maxVal = Math.max(...candidates.map(t=>osiTotal[t.id]));
    const top = candidates.filter(t => Math.abs(osiTotal[t.id]-maxVal) < 1e-6);
    if (top.length === 1) return { winner: top[0], step: 'OSI' };
    candidates = top;
  }

  // Step 4: Power Points — same logic, compares the actual value.
  {
    const maxVal = Math.max(...candidates.map(t=>ppTotal[t.id]));
    const top = candidates.filter(t => Math.abs(ppTotal[t.id]-maxVal) < 1e-6);
    if (top.length === 1) return { winner: top[0], step: 'Power Points' };
    candidates = top;
  }

  // Step 5: Coin Flip — genuinely unresolved by any objective criterion; needs a human.
  return { needsCoinFlip: true, tiedSubset: candidates };
}

// Resolves one full tied-UPR-score group into a final order, consulting any stored
// manual coin-flip resolutions. Returns { order, coinFlipsNeeded, tiebreakerLog } — the
// log explains, per team, which step decided their tiebreaker and against whom, so this
// can be shown publicly rather than silently reordering teams.
function resolveTieGroup(group, osiTotal, ppTotal){
  const originalGroupIds = new Set(group.map(t=>t.id));
  let remaining = [...group];
  const order = [];
  const coinFlipsNeeded = [];
  const rounds = []; // {step, winnerId, consideredIds}

  while (remaining.length > 0){
    if (remaining.length === 1){ order.push(remaining[0]); break; }
    const result = pickNextBest(remaining, originalGroupIds, osiTotal, ppTotal);
    if (result.winner){
      rounds.push({ step: result.step, winnerId: result.winner.id, consideredIds: remaining.map(t=>t.id) });
      order.push(result.winner);
      remaining = remaining.filter(t => t.id !== result.winner.id);
      continue;
    }
    // Needs a coin flip among result.tiedSubset.
    const key = groupKeyFor(result.tiedSubset.map(t=>t.id));
    const chosenId = coinFlipResolutions[key];
    const chosen = chosenId ? result.tiedSubset.find(t=>t.id===chosenId) : null;
    if (chosen){
      rounds.push({ step: 'Coin Flip', winnerId: chosen.id, consideredIds: result.tiedSubset.map(t=>t.id) });
      order.push(chosen);
      remaining = remaining.filter(t => t.id !== chosen.id);
      continue;
    }
    // No resolution on file — place this whole unresolved subset in stable order and stop
    // trying to resolve further within it (admin needs to flip a coin and pick a winner).
    coinFlipsNeeded.push({ key, teams: result.tiedSubset });
    result.tiedSubset.forEach(t => order.push(t));
    remaining = remaining.filter(t => !result.tiedSubset.some(o=>o.id===t.id));
  }

  const tiebreakerLog = {};
  rounds.forEach(rnd => {
    const winnerTeam = group.find(t=>t.id===rnd.winnerId);
    const otherIds = rnd.consideredIds.filter(id=>id!==rnd.winnerId);
    const otherNames = otherIds.map(id => { const t=group.find(g=>g.id===id); return t?t.name:null; }).filter(Boolean);
    tiebreakerLog[rnd.winnerId] = { step: rnd.step, result: 'won', vsNames: otherNames };
    otherIds.forEach(id => {
      if (!tiebreakerLog[id]) tiebreakerLog[id] = { step: rnd.step, result: 'lost', vsNames: [winnerTeam ? winnerTeam.name : ''] };
    });
  });

  return { order, coinFlipsNeeded, tiebreakerLog };
}

function computeUPR(sectionFilterKey){
  const { lockedSI, lockedSI_floored } = computeStrengthIndex();
  const finalCat = computeFinalCategories();
  const { ppTotal, ppGameLog } = computePowerPoints();
  const { osiTotal, osiGameLog } = computeOSI(lockedSI_floored, finalCat);

  // OSI/Power Points above are computed across the FULL statewide pool of teams/games —
  // cross-section opponents correctly influence these numbers (this includes ineligible
  // teams, whose games still count toward their opponents' OSI/Power Points). Ranking
  // below excludes ineligible teams and is scoped to one section only, per NJSIAA rules.
  const sectionTeams = (sectionFilterKey
    ? state.teams.filter(t => sectionKey(t.region,t.group) === sectionFilterKey)
    : state.teams
  ).filter(t => !t.ineligible && !t.isOutOfState);

  const byOSI = [...sectionTeams].sort((a,b)=>osiTotal[b.id]-osiTotal[a.id]);
  const byPP  = [...sectionTeams].sort((a,b)=>ppTotal[b.id]-ppTotal[a.id]);
  const osiRank = {}, ppRank = {};
  byOSI.forEach((t,i)=>osiRank[t.id]=i+1);
  byPP.forEach((t,i)=>ppRank[t.id]=i+1);

  const uprScore = {};
  sectionTeams.forEach(t => { uprScore[t.id] = osiRank[t.id]*0.6 + ppRank[t.id]*0.4; });

  let ranked = [...sectionTeams].sort((a,b)=>uprScore[a.id]-uprScore[b.id]);

  // Resolve exact UPR-score ties using the full 5-step tiebreaker chain.
  const tieFlags = {};
  const tiebreakerLog = {};
  {
    let i = 0;
    while (i < ranked.length){
      let j = i+1;
      while (j < ranked.length && Math.abs(uprScore[ranked[j].id]-uprScore[ranked[i].id]) < 1e-9) j++;
      if (j - i > 1){
        const group = ranked.slice(i, j);
        const { order, coinFlipsNeeded, tiebreakerLog: groupLog } = resolveTieGroup(group, osiTotal, ppTotal);
        for (let k=0; k<order.length; k++) ranked[i+k] = order[k];
        Object.assign(tiebreakerLog, groupLog);
        coinFlipsNeeded.forEach(({key, teams}) => {
          teams.forEach(t => { tieFlags[t.id] = { key, otherNames: teams.filter(o=>o.id!==t.id).map(o=>o.name) }; });
        });
      }
      i = j;
    }
  }

  // Head-to-head seeding cascade (insertion-style adjacent swap), run across top 17 (or fewer)
  const cascadeLimit = Math.min(ranked.length, 17);
  let jumped = {};
  for (let i=1; i<cascadeLimit; i++){
    let cur = i;
    while (cur>0){
      const lower = ranked[cur], upper = ranked[cur-1];
      const game = effectiveGames().find(g =>
        (g.teamA===lower.id && g.teamB===upper.id) || (g.teamB===lower.id && g.teamA===upper.id)
      );
      let lowerWon = false;
      if (game){
        const lowerIsA = game.teamA===lower.id;
        const lowerScore = lowerIsA? game.scoreA : game.scoreB;
        const upperScore = lowerIsA? game.scoreB : game.scoreA;
        lowerWon = lowerScore > upperScore;
      }
      if (lowerWon){
        [ranked[cur-1], ranked[cur]] = [ranked[cur], ranked[cur-1]];
        jumped[lower.id] = true;
        cur--;
      } else {
        break;
      }
    }
  }

  // Auto-qualifier / eliminator rule: an undefeated team (7+ wins vs NJSIAA member
  // schools, no ties) outside the top 16 bumps out the current bottom of the field.
  // Multiple such teams are processed in their own UPR order, each replacing whoever
  // is now lowest after the previous swap.
  const QUALIFY_LIMIT = 16;
  let top16 = ranked.slice(0, Math.min(QUALIFY_LIMIT, ranked.length));
  const autoQualifiedIn = {}, autoEliminated = {};
  if (ranked.length > QUALIFY_LIMIT){
    const top16Ids = new Set(top16.map(t=>t.id));
    const candidates = ranked.filter(t => !top16Ids.has(t.id)).filter(t => {
      const gl = teamGames(t.id);
      const losses = gl.filter(g=>g.result==='L').length;
      const ties = gl.filter(g=>g.result==='T').length;
      const memberWins = gl.filter(g => {
        if (g.result!=='W') return false;
        const opp = state.teams.find(o=>o.id===g.oppId);
        return !(opp && opp.isOutOfState);
      }).length;
      return losses===0 && ties===0 && memberWins>=7;
    });
    candidates.forEach(c => {
      if (top16.length < QUALIFY_LIMIT){ top16.push(c); autoQualifiedIn[c.id]=true; return; }
      const removed = top16[top16.length-1];
      top16[top16.length-1] = c;
      autoQualifiedIn[c.id] = true;
      autoEliminated[removed.id] = true;
    });
  }
  const qualifiedIds = new Set(top16.map(t=>t.id));

  return { ranked, osiTotal, ppTotal, osiRank, ppRank, uprScore, tieFlags, tiebreakerLog, jumped,
           qualifiedIds, autoQualifiedIn, autoEliminated, top16,
           lockedSI, lockedSI_floored, finalCat, ppGameLog, osiGameLog };
}

// Builds the two 8-team sectional brackets from a resolved top-16 seeding list.
// Placement (overall seed -> local slot) per NJSIAA snake:
//   #1 seed's bracket: slots 1-8 = overall seeds 1,4,5,8,9,12,13,16
//   #2 seed's bracket: slots 1-8 = overall seeds 2,3,6,7,10,11,14,15
// Within each bracket, first-round matchups are slot 1v8, 4v5, 3v6, 2v7.
// Northing decides which physical bracket label each #1-seed anchors: the higher
// northing of the two top seeds anchors the N1/Central bracket.
// Standard single-elimination first-round pairing for a power-of-two seed list,
// by local slot: e.g. 8 teams -> 1v8,4v5,3v6,2v7 ; 16 teams -> 1v16,8v9,5v12,4v13,3v14,6v11,7v10,2v15.
function standardPairing(n){
  // Recursively build the seed order so favorites meet last. Returns slot pairs.
  function buildOrder(size){
    if (size === 1) return [1];
    const prev = buildOrder(size/2);
    const out = [];
    prev.forEach(s => { out.push(s); out.push(size + 1 - s); });
    return out;
  }
  const order = buildOrder(n); // flat seed order; consecutive pairs are matchups
  const pairs = [];
  for (let i=0; i<order.length; i+=2) pairs.push([order[i], order[i+1]]);
  return pairs;
}

// Returns one of:
//   { type:'split', bracket1, bracket2, northingKnown }              (public North/South)
//   { type:'single', label, committeeSeeded, slots, matchups }       (non-public)
//   null                                                              (not enough teams)
function buildBrackets(seededField, region, group){
  const isNonPublic = (group === 'NPA' || group === 'NPB');

  if (isNonPublic){
    const size = (group === 'NPA') ? 8 : 16;
    if (!seededField || seededField.length < size) return null;
    const slots = [];
    for (let i=0;i<size;i++) slots.push({ localSlot:i+1, overallSeed:i+1, team: seededField[i] });
    const pairs = standardPairing(size).map(([a,b]) => ({
      high: slots.find(x=>x.localSlot===a),
      low:  slots.find(x=>x.localSlot===b)
    }));
    return {
      type: 'single',
      label: (group === 'NPA') ? 'Non-Public A' : 'Non-Public B',
      committeeSeeded: true,
      slots, matchups: pairs
    };
  }

  // Public supersection: two 8-team snake brackets.
  if (!seededField || seededField.length < 16) return null;
  const BRACKET1_SEEDS = [1,4,5,8,9,12,13,16];   // overall seeds, in local slot order 1..8
  const BRACKET2_SEEDS = [2,3,6,7,10,11,14,15];
  const seedToTeam = (overallSeed) => seededField[overallSeed-1];

  const b1 = BRACKET1_SEEDS.map((s,i) => ({ localSlot:i+1, overallSeed:s, team: seedToTeam(s) }));
  const b2 = BRACKET2_SEEDS.map((s,i) => ({ localSlot:i+1, overallSeed:s, team: seedToTeam(s) }));

  // Label pair depends on the supersection's region.
  const isSouth = (region === 'South');
  const firstLabel = isSouth ? 'Central' : 'North 1';
  const secondLabel = isSouth ? 'South' : 'North 2';

  // Higher northing among the two top seeds anchors the FIRST bracket (North 1 / Central).
  const seed1 = seedToTeam(1), seed2 = seedToTeam(2);
  const n1 = (seed1 && typeof seed1.northing === 'number') ? seed1.northing : null;
  const n2 = (seed2 && typeof seed2.northing === 'number') ? seed2.northing : null;
  const northingKnown = (n1 !== null && n2 !== null);

  // Default: bracket built from BRACKET1_SEEDS is anchored by overall #1 seed; if northing
  // says overall #2 is actually further north, the LABELS swap (so the geographically-north
  // bracket is North 1 / Central) while the seed structure stays fixed.
  let bracket1Label = firstLabel, bracket2Label = secondLabel;
  if (northingKnown && n2 > n1){ bracket1Label = secondLabel; bracket2Label = firstLabel; }

  const PAIRS = [[1,8],[4,5],[3,6],[2,7]];
  const pairUp = (slots) => PAIRS.map(([a,b]) => ({
    high: slots.find(x=>x.localSlot===a),
    low:  slots.find(x=>x.localSlot===b)
  }));

  return {
    type: 'split',
    northingKnown,
    bracket1: { label: bracket1Label, anchor: seed1, slots: b1, matchups: pairUp(b1) },
    bracket2: { label: bracket2Label, anchor: seed2, slots: b2, matchups: pairUp(b2) }
  };
}

}

    return;
  }
  if (!selectedSection || !sections.some(s=>sectionKey(s.region,s.group)===selectedSection)){
    selectedSection = sectionKey(sections[0].region, sections[0].group);
  }
  const sectionOptions = sections.map(s => {
    const key = sectionKey(s.region,s.group);
    return `<option value="${key}" ${key===selectedSection?'selected':''}>${s.label}</option>`;
  }).join('');

  if (!effectiveGames().length){
    el.innerHTML = `
      <div class="panel">
        <h2>Rankings</h2>
        <div class="form-row">
          <div class="field"><label>Section</label><select id="sectionSelect" onchange="selectedSection=this.value; renderResultsTab();">${sectionOptions}</select></div>
        </div>
        <p class="empty">Add games (or make predictions on the Predict tab) to see rankings for this section.</p>
      </div>`;
    return;
  }

  const r = computeUPR(selectedSection);

  let rows = r.ranked.map((t,i) => {
    const seed = i+1;
    const isQualify = r.qualifiedIds.has(t.id);
    const cutline = (seed === 16 && !r.autoQualifiedIn[t.id] && !r.autoEliminated[t.id]) ? 'cutline' : '';
    const jumpTag = r.jumped[t.id] ? '<span class="jump-tag">▲ H2H</span>' : '';
    const aqTag = r.autoQualifiedIn[t.id] ? '<span class="jump-tag" style="color:var(--gold);">★ Auto-Qualifier</span>' : '';
    const elimTag = r.autoEliminated[t.id] ? '<span class="tie-flag">Bumped by Auto-Qualifier</span>' : '';
    const tf = r.tieFlags[t.id];
    const tieTag = tf ? `<span class="tie-flag" title="Tied with: ${tf.otherNames.join(', ')}">COIN FLIP NEEDED</span>` : '';
    const tbLog = r.tiebreakerLog[t.id];
    const tbTag = tbLog
      ? `<span class="tb-tag" title="${tbLog.result==='won' ? 'Won' : 'Lost'} tiebreaker vs. ${tbLog.vsNames.join(', ')} — decided by ${tbLog.step}">${tbLog.result==='won'?'✓':'✗'} TB: ${tbLog.step}</span>`
      : '';
    return `
      <tr class="${isQualify?'qualify':''} ${cutline}">
        <td class="rank-num">${seed}</td>
        <td class="team-name" style="cursor:pointer" onclick="openDetail('${t.id}')">${t.name}${jumpTag}${aqTag}${elimTag}${tieTag}${tbTag}</td>
        <td class="num">${r.osiTotal[t.id].toFixed(2)}</td>
        <td class="num">${r.osiRank[t.id]}</td>
        <td class="num">${r.ppTotal[t.id].toFixed(2)}</td>
        <td class="num">${r.ppRank[t.id]}</td>
        <td class="num">${r.uprScore[t.id].toFixed(3)}</td>
        <td class="center">${catPill(r.finalCat[t.id])}</td>
      </tr>
    `;
  }).join('');

  // Any coin-flips needed in this section, deduplicated by key, for the admin resolution panel.
  const pendingFlips = [];
  const seenKeys = new Set();
  Object.values(r.tieFlags).forEach(tf => {
    if (seenKeys.has(tf.key)) return;
    seenKeys.add(tf.key);
    const teams = tf.key.split(',').map(id => state.teams.find(t=>t.id===id)).filter(Boolean);
    pendingFlips.push({ key: tf.key, teams });
  });
  const coinFlipPanel = pendingFlips.length ? `
    <div class="panel" style="border-color:var(--gold-dim);">
      <h2 style="color:var(--gold);">Coin Flips Needed ${isAdmin ? '' : '<span style="color:var(--chalk-dim); font-size:11px; text-transform:none;">(admin resolves these)</span>'}</h2>
      <p class="hint">These teams are tied even after Head-to-Head, Common Opponents, OSI, and Power Points — per the regs, only a real coin flip breaks this. Pick the winner of each flip below once it's been performed.</p>
      ${pendingFlips.map(pf => `
        <div class="form-row" style="align-items:center; margin-bottom:8px;">
          <span style="font-size:12.5px; color:var(--chalk-dim); min-width:160px;">${pf.teams.map(t=>t.name).join(' vs ')}:</span>
          ${isAdmin ? pf.teams.map(t => `<button class="ghost" onclick="resolveCoinFlip('${pf.key}','${t.id}')">${t.name} wins flip</button>`).join('') : ''}
        </div>
      `).join('')}
    </div>
  ` : '';

  el.innerHTML = `
    <div class="panel">
      <h2>Final Standings</h2>
      <div class="form-row">
        <div class="field"><label>Section</label><select id="sectionSelect" onchange="selectedSection=this.value; renderResultsTab();">${sectionOptions}</select></div>
      </div>
      ${hasAnyProjectedGames() ? `<p style="background:rgba(201,162,39,0.12); border:1px solid var(--gold-dim); border-radius:4px; padding:8px 12px; font-size:12.5px; color:var(--gold); margin:0 0 14px;">
        ⚡ These rankings include your own predictions for one or more not-yet-played games. Only you see this — switch to the Predict tab to change picks, or <span style="text-decoration:underline; cursor:pointer;" onclick="clearAllPredictions()">clear all your predictions</span> to see official-only rankings.
      </p>` : ''}
      <p class="hint">Lower UPR score = better. Ranking is scoped to this section only — but OSI/Power Points totals already account for any games against teams in <em>other</em> sections. Green rows qualify for states (top 16, after any auto-qualifier swaps). Dashed line marks the natural #16 cutoff. "▲ H2H" = moved up via the seeding rule; "★ Auto-Qualifier" = undefeated team (7+ wins vs. member schools, no ties) that bumped into the field; "Bumped by Auto-Qualifier" = lost a spot because of one. Click a team name for its full breakdown.</p>
      <div class="table-scroll">
        <table class="results-table">
          <thead><tr>
            <th>Seed</th><th>Team</th>
            <th class="num">OSI</th><th class="num">OSI Rk</th>
            <th class="num">Power Pts</th><th class="num">PP Rk</th>
            <th class="num">UPR</th><th class="center">Mult. Cat (final)</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="legend">
        <span><span class="dot" style="background:rgba(60,107,66,0.5)"></span>Qualifies for states</span>
        <span>▲ H2H = moved up via head-to-head jump rule</span>
        <span style="color:var(--gold)">★ Auto-Qualifier = undefeated team bumped into the field</span>
        <span style="color:#7ec8e8">✓/✗ TB: [step] = result of a tiebreaker — hover for who and why</span>
      </div>
    </div>
    ${coinFlipPanel}
    <div class="panel">
      <h2>Known limitations</h2>
      <p class="hint" style="margin-bottom:0;">
        Not yet implemented: the North/South snake-seeding bracket display (qualification and seeding order are fully modeled — head-to-head, common opponents, OSI, Power Points, coin flip, and the auto-qualifier/eliminator rule are all live). The bracket pairing/home-team display is the remaining piece.
      </p>
    </div>
  `;
}

function renderBracketTab(){
  const el = document.getElementById('tab-bracket');
  const sections = getAllSections();
  if (!sections.length){
    el.innerHTML = `<div class="panel"><p class="empty">No sections yet.</p></div>`;
    return;
  }
  if (!selectedBracketSection || !sections.some(s=>sectionKey(s.region,s.group)===selectedBracketSection)){
    selectedBracketSection = sectionKey(sections[0].region, sections[0].group);
  }
  const sectionOptions = sections.map(s => {
    const key = sectionKey(s.region,s.group);
    return `<option value="${key}" ${key===selectedBracketSection?'selected':''}>${s.label}</option>`;
  }).join('');

  const selSection = sections.find(s => sectionKey(s.region,s.group)===selectedBracketSection);
  const region = selSection ? selSection.region : null;
  const group = selSection ? selSection.group : null;
  const isNonPublic = (group === 'NPA' || group === 'NPB');

  const r = computeUPR(selectedBracketSection);
  // top16 is the resolved, seeded field (tiebreakers + auto-qualifiers applied). For NPA the
  // bracket is only the top 8 of that; NPB and publics use the full 16.
  const field = (group === 'NPA') ? (r.top16 ? r.top16.slice(0,8) : []) : r.top16;
  const brackets = buildBrackets(field, region, group);

  const needLabel = isNonPublic ? (group==='NPA' ? '8' : '16') : '16';
  const haveCount = r.top16 ? (group==='NPA' ? Math.min(r.top16.length,8) : r.top16.length) : 0;

  const projNote = hasAnyProjectedGames() ? `<p style="background:rgba(201,162,39,0.12); border:1px solid var(--gold-dim); border-radius:4px; padding:8px 12px; font-size:12.5px; color:var(--gold); margin:0 0 4px;">⚡ This bracket reflects your own predictions for not-yet-played games.</p>` : '';

  let hintText;
  if (isNonPublic){
    hintText = `Non-public teams are <strong>seeded by committee</strong>, not by this bracket — the order shown here is the UPR ranking as a reference only, and the actual tournament seeding may differ.`;
  } else {
    hintText = `Seeding uses the final resolved top 16 (after tiebreakers, head-to-head, and auto-qualifiers), split into two 8-team brackets via the NJSIAA snake.${brackets && brackets.type==='split' && !brackets.northingKnown ? ' <strong>Northing not set for the top two seeds — bracket labels may be reversed until you add northing on the Teams tab.</strong>' : ''}`;
  }

  const header = `
    <div class="panel">
      <h2>Tournament Bracket</h2>
      <div class="form-row">
        <div class="field"><label>Section</label><select id="bracketSectionSelect" onchange="selectedBracketSection=this.value; renderBracketTab();">${sectionOptions}</select></div>
      </div>
      ${projNote}
      <p class="hint">${hintText}</p>
    </div>`;

  if (!brackets){
    el.innerHTML = header + `<div class="panel"><p class="empty">This section needs a full field of ${needLabel} qualified teams before a bracket can be seeded. (${haveCount} currently qualified.)</p></div>`;
    return;
  }

  const matchupHtml = (m, useLocalSlot) => {
    const teamLine = (entry) => {
      if (!entry || !entry.team) return `<div class="bk-team"><span class="bk-seed">—</span> <span>TBD</span></div>`;
      const seedNum = useLocalSlot ? entry.localSlot : entry.overallSeed;
      return `<div class="bk-team">
        <span class="bk-seed">${seedNum}</span>
        <span class="bk-name">${entry.team.name}</span>
      </div>`;
    };
    return `<div class="bk-matchup">${teamLine(m.high)}${teamLine(m.low)}</div>`;
  };

  const bracketColumn = (bracket, showAnchor, useLocalSlot) => `
    <div class="bk-col">
      <div class="bk-col-title">${bracket.label}</div>
      ${showAnchor ? `<div class="bk-col-sub">Top seed: ${bracket.anchor ? bracket.anchor.name : '—'}</div>` : ''}
      ${bracket.matchups.map(m => matchupHtml(m, useLocalSlot)).join('')}
    </div>`;

  if (brackets.type === 'single'){
    el.innerHTML = header + `
      <div class="panel">
        <p style="background:rgba(201,162,39,0.12); border:1px solid var(--gold-dim); border-radius:4px; padding:8px 12px; font-size:12.5px; color:var(--gold); margin:0 0 16px;">⚖ Committee-seeded — the bracket below orders teams by UPR for reference only.</p>
        <div class="bk-wrap">
          ${bracketColumn(brackets, false, false)}
        </div>
        <p class="hint" style="margin-top:16px; margin-bottom:0;">Numbers shown are UPR seeds. First-round pairing follows standard bracket structure (1 vs ${brackets.slots.length}, and so on toward the middle).</p>
      </div>`;
    return;
  }

  el.innerHTML = header + `
    <div class="panel">
      <div class="bk-wrap">
        ${bracketColumn(brackets.bracket1, true, true)}
        ${bracketColumn(brackets.bracket2, true, true)}
      </div>
      <p class="hint" style="margin-top:16px; margin-bottom:0;">Each bracket is seeded 1–8, pairing 1v8, 4v5, 3v6, 2v7. Once a supersection splits into these two brackets, no further head-to-head movement occurs.</p>
    </div>`;
}

    el.innerHTML = `<div class="panel"><p class="empty">Add teams first.</p></div>`;
    return;
  }
  if (!selectedDetailTeam) selectedDetailTeam = state.teams[0].id;
  const r = computeUPR();
  const options = [...state.teams]
    .sort((a,b)=> a.name.localeCompare(b.name))
    .map(t=>`<option value="${t.id}" ${t.id===selectedDetailTeam?'selected':''}>${t.name}</option>`).join('');

  const ppLog = r.ppGameLog[selectedDetailTeam] || [];
  const osiLog = r.osiGameLog[selectedDetailTeam] || [];

  const ppRows = ppLog.map(l => `
    <tr>
      <td class="num">${l.week}</td>
      <td class="team-name">${teamName(l.oppId)}</td>

      <td class="num">${l.quality}</td>

      <td class="center">${l.result}</td>
      <td class="num">${l.oppSI.toFixed(2)}</td>
      <td class="num">${(l.pct*100).toFixed(0)}%${l.boosted?' <span style="color:var(--gold)">(boost)</span>':''}</td>

  el.innerHTML = `

      <h2>Team detail</h2>

    </div>
    <div class="panel">
      <h2>Power Points breakdown — ${teamName(selectedDetailTeam)} <span style="color:var(--chalk-dim); font-size:13px; text-transform:none;">(${(()=>{const t=state.teams.find(t=>t.id===selectedDetailTeam); return t?sectionLabel(t.region,t.group):'';})()})</span></h2>
      <p class="hint">Residual points are based on each opponent's first 7 games, capped at 18 per game. Final total ÷ ${Math.max(ppLog.length,7)} (min. 7 games).</p>
      <div class="table-scroll">
        <table>
          <thead><tr><th class="num">Wk</th><th>Opponent</th><th class="center">Result</th><th class="num">Quality</th><th class="num">Residual</th><th class="num">Game Total</th></tr></thead>
          <tbody>${ppRows}</tbody>
        </table>
      </div>

    <div class="panel">
      <h2>OSI breakdown — ${teamName(selectedDetailTeam)}</h2>
      <p class="hint">Uses opponents' locked (Week 7) Strength Index, floored at 20. "(boost)" = non-public multiplier bonus percentage applied (capped at 2 games/season).</p>
      <div class="table-scroll">
        <table>
          <thead><tr><th class="num">Wk</th><th>Opponent</th><th class="center">Result</th><th class="num">Opp. SI</th><th class="num">% Used</th><th class="num">Value</th></tr></thead>
          <tbody>${osiRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderPredictTab(){
  const el = document.getElementById('tab-predict');
  const allTbdGames = state.games.filter(g => g.scoreA===null || g.scoreA===undefined || g.scoreB===null || g.scoreB===undefined);
  const totalPicked = Object.keys(predictions).length;

  if (!allTbdGames.length){
    el.innerHTML = `<div class="panel"><p class="empty">No upcoming (TBD) games scheduled yet — admin adds these with blank scores on the Games tab.</p></div>`;
    return;
  }

  const tbdGames = allTbdGames
    .filter(g => (predictFilterWeek==='all' || String(g.week)===String(predictFilterWeek)))
    .filter(g => gameMatchesSection(g, predictFilterSection))
    .filter(g => predictFilterSection==='all' || !gameBothIneligible(g)) // hide both-ineligible matchups when viewing a specific section
    .filter(g => gameMatchesEligibilityFilter(g, predictFilterEligibility));

  const sorted = [...tbdGames].sort((a,b)=> a.week-b.week);
  const rows = sorted.map(g => {
    const pick = predictions[g.id];
    const btnA = `<button class="${pick===g.teamA?'':'ghost'}" style="${pick===g.teamA?'':'background:transparent;'}" onclick="setPrediction('${g.id}','${g.teamA}')">${teamName(g.teamA)} wins</button>`;
    const btnB = `<button class="${pick===g.teamB?'':'ghost'}" style="${pick===g.teamB?'':'background:transparent;'}" onclick="setPrediction('${g.id}','${g.teamB}')">${teamName(g.teamB)} wins</button>`;
    return `
      <tr>
        <td class="num">${g.week}</td>
        <td class="team-name">
          ${teamName(g.teamA)}${teamInfoBadge(g.teamA)}
          <div style="margin:4px 0; color:var(--chalk-dim); font-size:11px;">vs</div>
          ${teamName(g.teamB)}${teamInfoBadge(g.teamB)}
        </td>
        <td class="center" style="display:flex; gap:6px; justify-content:center;">${btnA}${btnB}</td>
        <td class="center">${pick ? `<button class="danger" onclick="clearPrediction('${g.id}')">Clear</button>` : ''}</td>
      </tr>
    `;
  }).join('');
  const rowsOrEmpty = sorted.length ? rows : `<tr><td colspan="4" class="empty">No upcoming games match this filter.</td></tr>`;

  el.innerHTML = `
    <div class="panel">
      <h2>Make Your Predictions</h2>
      <p class="hint">Pick a winner for any upcoming game — picks assume a flat ${PREDICTION_MARGIN}-point margin for ranking-math purposes. Your picks are private to you; they only change what <em>you</em> see on the Rankings tab, never the official schedule. Once the admin enters a real result, your pick for that game stops mattering automatically.</p>
      <div class="form-row" style="align-items:center;">
        <div class="field"><label>Week</label><select id="predictWeekFilter" onchange="predictFilterWeek=this.value; renderPredictTab();">${buildWeekFilterOptions(predictFilterWeek)}</select></div>
        <div class="field"><label>Section</label><select id="predictSectionFilter" onchange="predictFilterSection=this.value; renderPredictTab();">${buildSectionFilterOptions(predictFilterSection)}</select></div>
        <div class="field"><label>Eligibility</label><select id="predictEligFilter" onchange="predictFilterEligibility=this.value; renderPredictTab();">${buildEligibilityFilterOptions(predictFilterEligibility)}</select></div>
      </div>
      <div class="form-row" style="align-items:center;">
        <button class="ghost" onclick="randomizeWeek()" ${predictFilterWeek==='all' ? 'disabled style="opacity:0.4; cursor:not-allowed;"' : ''} title="${predictFilterWeek==='all' ? 'Select a specific week first' : ''}">🎲 Randomize Week ${predictFilterWeek!=='all' ? '('+predictFilterWeek+')' : ''}</button>
        <button class="ghost" onclick="randomizeAllPredictions()">🎲 Randomize All${predictFilterSection!=='all' || predictFilterEligibility!=='all' ? ' (filtered)' : ''}</button>
        <button class="danger" style="margin-left:auto; ${totalPicked?'':'opacity:0.4; cursor:not-allowed;'}" onclick="clearAllPredictions()" ${totalPicked?'':'disabled'}>Clear ALL my predictions (${totalPicked})</button>
      </div>
      <div class="table-scroll">
        <table>
          <thead><tr><th class="num">Wk</th><th>Matchup</th><th class="center">Your Pick</th><th class="center">—</th></tr></thead>
          <tbody>${rowsOrEmpty}</tbody>
        </table>
      </div>
      <div class="legend" style="margin-top:14px;">
        <span>You've picked ${sorted.filter(g=>predictions[g.id]).length} of ${sorted.length} games shown (${totalPicked} total across all weeks/sections)</span>
      </div>
    </div>
  `;
}

async function setPrediction(gameId, teamId){
  if (!currentSession || !currentSession.user) return;
  predictions[gameId] = teamId;
  renderAll();
  const { error } = await sb.from('predictions').upsert(
    { user_id: currentSession.user.id, game_id: gameId, winning_team_id: teamId },
    { onConflict: 'user_id,game_id' }
  );
  if (error) { console.error('Failed to save prediction', error); showToast('Could not save your pick — try again.'); }
}
async function clearPrediction(gameId){
  if (!currentSession || !currentSession.user) return;
  delete predictions[gameId];
  renderAll();
  const { error } = await sb.from('predictions').delete()
    .eq('user_id', currentSession.user.id).eq('game_id', gameId);
  if (error) console.error('Failed to clear prediction', error);
}
async function clearAllPredictions(){
  if (!currentSession || !currentSession.user) return;
  predictions = {};
  renderAll();
  const { error } = await sb.from('predictions').delete().eq('user_id', currentSession.user.id);
  if (error) console.error('Failed to clear predictions', error);
}

async function resolveCoinFlip(key, winnerId){
  if (!isAdmin) return;
  coinFlipResolutions[key] = winnerId;
  renderAll();
  const { error } = await sb.from('coin_flips').upsert({ key, winning_team_id: winnerId }, { onConflict: 'key' });
  if (error) { console.error('Failed to save coin flip', error); showToast('Could not save that — try again.'); }
}
async function resetAllCoinFlips(){
  if (!isAdmin) return;
  coinFlipResolutions = {};
  renderAll();
  const { error } = await sb.from('coin_flips').delete().not('key', 'is', null);
  if (error) console.error('Failed to reset coin flips', error);
}

function tbdGamesMatchingPredictFilters(includeWeekFilter){
  return state.games
    .filter(g => g.scoreA===null || g.scoreA===undefined || g.scoreB===null || g.scoreB===undefined)
    .filter(g => !includeWeekFilter || predictFilterWeek==='all' || String(g.week)===String(predictFilterWeek))
    .filter(g => gameMatchesSection(g, predictFilterSection))
    .filter(g => predictFilterSection==='all' || !gameBothIneligible(g))
    .filter(g => gameMatchesEligibilityFilter(g, predictFilterEligibility));
}
async function randomizeWeek(){
  if (predictFilterWeek === 'all') return; // requires a specific week to be selected
  if (!currentSession || !currentSession.user) return;
  const targets = tbdGamesMatchingPredictFilters(true);
  const rows = targets.map(g => {
    const winner = Math.random() < 0.5 ? g.teamA : g.teamB;
    predictions[g.id] = winner;
    return { user_id: currentSession.user.id, game_id: g.id, winning_team_id: winner };
  });
  renderAll();
  if (rows.length){
    const { error } = await sb.from('predictions').upsert(rows, { onConflict: 'user_id,game_id' });
    if (error) console.error('Failed to save randomized predictions', error);
  }
}
async function randomizeAllPredictions(){
  // Ignores the Week filter on purpose (that's the "All" in Randomize All) but still
  // respects whatever Section/Eligibility filters are active.
  if (!currentSession || !currentSession.user) return;
  const targets = tbdGamesMatchingPredictFilters(false);
  const rows = targets.map(g => {
    const winner = Math.random() < 0.5 ? g.teamA : g.teamB;
    predictions[g.id] = winner;
    return { user_id: currentSession.user.id, game_id: g.id, winning_team_id: winner };
  });
  renderAll();
  if (rows.length){
    const { error } = await sb.from('predictions').upsert(rows, { onConflict: 'user_id,game_id' });
    if (error) console.error('Failed to save randomized predictions', error);
  }
}

function renderAll(){
  renderSiteMessage();
  renderTeamsTab();
  renderGamesTab();
  renderPredictTab();
  renderResultsTab();
  renderBracketTab();
  renderDetailTab();
}

function renderSiteMessage(){
  const banner = document.getElementById('siteMessageBanner');
  const editor = document.getElementById('siteMessageEditor');
  if (!banner || !editor) return;

  // Public banner: shows only when there's a non-empty message.
  const msg = (siteMessage || '').trim();
  if (msg){
    banner.style.display = 'block';
    banner.innerHTML = `
      <div style="background:rgba(201,162,39,0.12); border:1px solid var(--gold-dim); border-left:4px solid var(--gold); border-radius:4px; padding:12px 16px; margin-bottom:14px; color:var(--chalk); font-size:14px; line-height:1.5;">
        <span style="color:var(--gold); font-weight:600; font-family:'Oswald',sans-serif; text-transform:uppercase; font-size:12px; letter-spacing:0.5px; display:block; margin-bottom:4px;">Announcement</span>
        ${escapeHtml(msg)}
      </div>`;
  } else {
    banner.style.display = 'none';
    banner.innerHTML = '';
  }

  // Admin editor: only visible when logged in.
  if (isAdmin){
    editor.style.display = 'block';
    editor.innerHTML = `
      <div class="panel">
        <h2>Public Announcement <span style="color:var(--gold); font-size:11px; text-transform:none; letter-spacing:0;">(admin only)</span></h2>
        <p class="hint">Whatever you type here shows as a banner at the top of the site for every visitor. Leave it blank and save to remove the banner.</p>
        <textarea id="siteMessageInput" rows="3" style="width:100%; background:var(--panel-raised); border:1px solid var(--line); color:var(--chalk); border-radius:4px; padding:10px; font-family:'Inter',sans-serif; font-size:13px;" placeholder="e.g. Week 8 rankings are now final.">${escapeHtml(siteMessage || '')}</textarea>
        <div class="form-row" style="margin-top:10px;">
          <button onclick="saveSiteMessage()">Save announcement</button>
          <button class="ghost" onclick="clearSiteMessage()">Clear banner</button>
        </div>
      </div>`;
  } else {
    editor.style.display = 'none';
    editor.innerHTML = '';
  }
}

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function saveSiteMessage(){
  if (!isAdmin) return;
  const input = document.getElementById('siteMessageInput');
  const newMsg = input ? input.value : '';
  siteMessage = newMsg;
  renderSiteMessage();
  const { error } = await sb.from('site_message').update({ message: newMsg, updated_at: new Date().toISOString() }).eq('id', 1);
  if (error) { console.error('Failed to save announcement', error); showToast('Could not save announcement — try again.'); }
  else showToast('Announcement saved.');
}
async function clearSiteMessage(){
  if (!isAdmin) return;

}

async function setEligible(teamId, checked){
  const t = state.teams.find(t=>t.id===teamId);

  renderAll();

  if (error) { console.error('Failed to update eligibility', error); showToast('Could not save — try again.'); }
}
function showToast(msg, type){
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  // Subtle colored left border: red for errors, green for success, neutral otherwise.
  const isError = /could not|fail|try again/i.test(msg) && type !== 'success';
  el.style.borderLeft = '4px solid ' + (isError ? 'var(--red)' : 'var(--turf-bright)');
  el.style.display = 'block';
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>{ el.style.display='none'; }, 3500);
}
async function setTeamName(teamId, value){
  const t = state.teams.find(t=>t.id===teamId);
  if (!t) return;
  const newName = value.trim();
  if (!newName) { renderAll(); return; } // ignore blank, just re-render to restore old value on screen
  const clash = state.teams.some(o => o.id!==teamId && o.name.toLowerCase()===newName.toLowerCase());
  if (clash) {
    showToast('Another team already has that name.');
    renderAll();
    return;
  }
  t.name = newName;
  renderAll();
  const { error } = await sb.from('teams').update({ name: newName }).eq('id', teamId);
  if (error) { console.error('Failed to rename team', error); showToast('Could not save — try again.'); }
}
async function setStartSI(teamId, value){
  const t = state.teams.find(t=>t.id===teamId);
  if (!t) return;
  const v = parseFloat(value);
  if (isNaN(v)) return;
  t.startSI = v;
  renderAll();
  const { error } = await sb.from('teams').update({ start_si: v }).eq('id', teamId);
  if (error) { console.error('Failed to update SI', error); showToast('Could not save — try again.'); }
}
async function setNorthing(teamId, value){
  const t = state.teams.find(t=>t.id===teamId);
  if (!t) return;
  const trimmed = String(value).trim();
  const v = trimmed === '' ? null : parseFloat(trimmed);
  if (trimmed !== '' && isNaN(v)) return;
  t.northing = v;
  renderAll();
  const { error } = await sb.from('teams').update({ northing: v }).eq('id', teamId);
  if (error) { console.error('Failed to update northing', error); showToast('Could not save — try again.'); }

async function setOOSField(teamId, field, value){
  const t = state.teams.find(t=>t.id===teamId);
  if (!t) return;
  const v = parseFloat(value);
  if (isNaN(v)) return;
  let dbPatch;
  if (field === 'si'){ t.startSI = v; dbPatch = { start_si: v }; }
  else {
    t.manualRecord = t.manualRecord || {w:0,t:0,l:0};
    t.manualRecord[field] = Math.max(0, Math.round(v));
    dbPatch = { manual_record: t.manualRecord };
  }
  renderAll();
  const { error } = await sb.from('teams').update(dbPatch).eq('id', teamId);
  if (error) { console.error('Failed to update out-of-state team', error); showToast('Could not save — try again.'); }
}
async function removeTeam(id){
  if (!isAdmin) return;
  state.teams = state.teams.filter(t=>t.id!==id);
  state.games = state.games.filter(g=>g.teamA!==id && g.teamB!==id);

async function bulkSetNorthing(){
  if (!isAdmin) return;
  const textEl = document.getElementById('bulkNorthingInput');
  const statusEl = document.getElementById('bulkNorthingStatus');
  const lines = textEl.value.split('\n').map(l=>l.trim()).filter(l=>l.length);

  const teamByName = {};
  state.teams.forEach(t => { teamByName[t.name.toLowerCase()] = t; });

  let updates = [], errors = [];
  lines.forEach((line, idx) => {
    const lineNum = idx + 1;
    if (/^team\b/i.test(line)) return; // skip an optional header row
    const fields = (line.includes('\t') ? line.split('\t') : line.split(',')).map(f=>f.trim());
    if (fields.length < 2) { errors.push(`Line ${lineNum}: needs "team name, northing value"`); return; }
    const value = parseFloat(fields[fields.length-1]);
    const name = fields.slice(0, -1).join(',').trim();
    if (isNaN(value)) { errors.push(`Line ${lineNum}: "${fields[fields.length-1]}" isn't a valid number`); return; }
    const team = teamByName[name.toLowerCase()];
    if (!team) { errors.push(`Line ${lineNum}: team "${name}" not found`); return; }
    team.northing = value;
    updates.push({ id: team.id, northing: value });
  });

  renderAll();
  if (updates.length){
    const { error } = await sb.from('teams').upsert(updates, { onConflict: 'id' });
    if (error) { console.error('Bulk northing update failed', error); errors.push('⚠ Database write failed: ' + error.message); }
  }
  const log = [`Updated northing for ${updates.length} team(s).`];
  if (errors.length) log.push(`⚠ ${errors.length} line(s) had issues:`, ...errors.map(e=>'&nbsp;&nbsp;'+e));
  if (statusEl) { statusEl.style.display='block'; statusEl.innerHTML = log.join('<br>'); }
  if (updates.length && !errors.length) textEl.value = '';
}

async function bulkAddGames(){
  if (!isAdmin) return;
  const textEl = document.getElementById('bulkGamesInput');
  const statusEl = document.getElementById('bulkAddStatus');
  const raw = textEl.value;
  const lines = raw.split('\n').map(l=>l.trim()).filter(l=>l.length);

  const nameToId = {};
  state.teams.forEach(t => { nameToId[t.name.toLowerCase()] = t.id; });

  let newGames = [], dupSkipped = 0, errors = [];
  lines.forEach((line, idx) => {
    const lineNum = idx + 1;
    if (/^week\b/i.test(line)) return; // skip an optional header row
    const fields = (line.includes('\t') ? line.split('\t') : line.split(',')).map(f=>f.trim());
    if (fields.length < 3) { errors.push(`Line ${lineNum}: needs at least week, team A, team B`); return; }
    const week = parseInt(fields[0], 10);
    if (isNaN(week)) { errors.push(`Line ${lineNum}: "${fields[0]}" isn't a valid week number`); return; }
    const teamAId = nameToId[fields[1].toLowerCase()];
    const teamBId = nameToId[fields[2].toLowerCase()];
    if (!teamAId) { errors.push(`Line ${lineNum}: team "${fields[1]}" not found`); return; }
    if (!teamBId) { errors.push(`Line ${lineNum}: team "${fields[2]}" not found`); return; }
    let scoreA = null, scoreB = null;
    if (fields.length >= 5 && fields[3] !== '' && fields[4] !== '') {
      const a = parseInt(fields[3],10), b = parseInt(fields[4],10);
      if (!isNaN(a) && !isNaN(b)) { scoreA = a; scoreB = b; }
    }
    const dup = state.games.some(g => g.week===week &&
      ((g.teamA===teamAId && g.teamB===teamBId) || (g.teamA===teamBId && g.teamB===teamAId)));
    if (dup || newGames.some(g => g.week===week && ((g.teamA===teamAId&&g.teamB===teamBId)||(g.teamA===teamBId&&g.teamB===teamAId)))) {
      dupSkipped++; return;
    }
    newGames.push({id: uid('g'), week, teamA: teamAId, teamB: teamBId, scoreA, scoreB});
  });

  newGames.forEach(g => state.games.push(g));
  renderAll();
  if (newGames.length){
    const { error } = await sb.from('games').insert(newGames.map(localGameToDb));
    if (error) { console.error('Bulk game add failed', error); errors.push('⚠ Database write failed: ' + error.message); }
  }
  const log = [`Added ${newGames.length} game(s).`];
  if (dupSkipped) log.push(`Skipped ${dupSkipped} duplicate(s) already in the schedule.`);
  if (errors.length) log.push(`⚠ ${errors.length} line(s) had issues:`, ...errors.map(e=>'&nbsp;&nbsp;'+e));
  if (statusEl) { statusEl.style.display='block'; statusEl.innerHTML = log.join('<br>'); }
  if (newGames.length && !errors.length) textEl.value = '';
}
